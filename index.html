<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Atlas Funded — Risk Operations</title>
<link rel="preconnect" href="https://rsms.me" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jetbrains-mono@1.0.6/css/jetbrains-mono.min.css" />
<style>
  :root{
    --bg:#0b0d12; --bg-elev:#0f121a; --panel:#13171f; --panel-2:#171c25;
    --line:#1e242f; --line-strong:#2a3140;
    --ink:#eef0f4; --muted:#a6acba; --faint:#6b7280;
    --brand:#E1FFA0; --brand-ink:#0a0d14;
    --brand-soft:rgba(225,255,160,.13); --brand-line:rgba(225,255,160,.42);
    --signal:#ef5c5c; --signal-soft:rgba(239,92,92,.10);
    --warn:#f3b352;   --warn-soft:rgba(243,179,82,.10);
    --ok:#5fd09b;     --ok-soft:rgba(95,208,155,.10);
    color-scheme: dark;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',-apple-system,system-ui,sans-serif;font-size:13px;line-height:1.5;
    -webkit-font-smoothing:antialiased;min-height:100vh}
  .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;font-feature-settings:"tnum","zero"}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}

  .app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
  .nav{background:var(--bg-elev);border-right:1px solid var(--line);padding:18px 14px;
    display:flex;flex-direction:column;gap:24px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-.01em;padding:0 4px}
  .brand-mark{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#E1FFA0 0%,#a4d062 100%);position:relative;box-shadow:0 0 0 1px rgba(255,255,255,.06) inset}
  .brand-mark::after{content:"";position:absolute;inset:5px;border-radius:2px;background:rgba(0,0,0,.55)}
  .nav-section h6{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
    margin:0 6px 6px;font-weight:600}
  .nav a{display:flex;align-items:center;justify-content:space-between;color:var(--muted);
    font-size:12.5px;padding:7px 10px;border-radius:6px}
  .nav a:hover{background:var(--panel)}
  .nav a.active{background:var(--brand-soft);color:var(--ink);box-shadow:0 0 0 1px var(--brand-line) inset}
  .nav a .badge{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--faint);background:var(--panel);padding:1px 6px;border-radius:99px}
  .nav a.active .badge{color:var(--brand);background:rgba(225,255,160,.16)}

  .me{margin-top:auto;display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);
    border-radius:8px;background:var(--panel)}
  .me .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#5fd09b,#3a9d6c);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#0b0d12}
  .me .who{font-size:12px}
  .me .who small{display:block;color:var(--faint);font-size:10.5px}

  main{padding:20px 28px 60px;max-width:1280px}

  .eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:500}
  .crumbs{display:flex;align-items:center;justify-content:space-between;color:var(--faint);font-size:12px;margin-bottom:18px}
  .crumbs b{color:var(--muted);font-weight:500}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}
  .pill.warn{background:var(--warn-soft);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(243,179,82,.3)}
  .pill.ok{background:var(--ok-soft);color:var(--ok);box-shadow:inset 0 0 0 1px rgba(95,208,155,.3)}
  .pill.muted{background:var(--panel);color:var(--muted);box-shadow:inset 0 0 0 1px var(--line-strong)}
  .pill.signal{background:var(--signal-soft);color:var(--signal);box-shadow:inset 0 0 0 1px rgba(239,92,92,.3)}

  .btn{padding:8px 14px;border-radius:7px;border:1px solid var(--line-strong);background:var(--panel);
    color:var(--ink);font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:var(--panel-2)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:var(--brand-ink);font-weight:600}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.danger{color:var(--signal);border-color:rgba(239,92,92,.4);background:transparent}
  .btn.danger:hover{background:var(--signal-soft)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px}
  .card h3{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
    font-weight:600;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center}
  .card h3 .delta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ok);
    font-weight:500;letter-spacing:0;text-transform:none}

  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;font-weight:500;color:var(--faint);font-size:10.5px;
    letter-spacing:.08em;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--line);
    background:var(--panel-2)}
  td{padding:11px 14px;border-bottom:1px solid var(--line);color:var(--muted);vertical-align:middle}
  tr:last-child td{border-bottom:0}
  td.num{text-align:right;color:var(--ink)}

  .signin-shell{display:grid;place-items:center;min-height:100vh;background:var(--bg)}
  .signin{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:28px}
  .signin .brand{margin-bottom:24px}
  .signin h1{font-size:20px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em}
  .signin p{margin:0 0 24px;color:var(--faint);font-size:12px}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:500}
  .field input,.field select,.field textarea{background:var(--bg-elev);border:1px solid var(--line-strong);
    border-radius:6px;padding:9px 12px;font-size:13px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .field .help{font-size:11px;color:var(--faint)}

  .hero{background:linear-gradient(180deg,rgba(225,255,160,.05),rgba(225,255,160,0) 65%),var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:18px}
  .hero h1{font-size:20px;font-weight:600;letter-spacing:-.01em;margin:0 0 4px}
  .hero .sub{color:var(--faint);font-size:12.5px}
  .hero-meta{display:flex;flex-wrap:wrap;gap:18px;margin-top:14px;font-size:12px;color:var(--muted)}
  .hero-meta b{color:var(--faint);font-weight:500;margin-right:6px}

  .verdict-banner{display:flex;align-items:center;gap:14px;margin-top:16px;padding:14px 16px;
    border-radius:8px;background:var(--signal-soft);box-shadow:inset 0 0 0 1px rgba(239,92,92,.25)}
  .verdict-banner.ok{background:var(--ok-soft);box-shadow:inset 0 0 0 1px rgba(95,208,155,.25)}
  .verdict-banner .ic{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;
    justify-content:center;font-weight:700;background:rgba(239,92,92,.18);color:var(--signal)}
  .verdict-banner.ok .ic{background:rgba(95,208,155,.18);color:var(--ok)}
  .verdict-banner .t{font-size:13px}
  .verdict-banner .t b{font-weight:600;color:var(--signal)}
  .verdict-banner.ok .t b{color:var(--ok)}
  .verdict-banner .t small{display:block;color:var(--muted);font-size:11.5px;margin-top:2px}

  .charts-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:14px;margin-top:14px}
  .charts-grid .span2{grid-column:span 2}
  .axis-text{font-family:'JetBrains Mono',monospace;font-size:9.5px;fill:var(--faint)}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--faint);margin-top:8px}
  .legend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}

  .bcards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
  .bcard{position:relative;padding:16px;border-radius:8px;background:var(--panel);
    border:1px solid var(--line);overflow:hidden}
  .bcard.signal{border-color:rgba(239,92,92,.28);background:linear-gradient(180deg,rgba(239,92,92,.06),rgba(239,92,92,0) 60%),var(--panel)}
  .bcard.warn{border-color:rgba(243,179,82,.28);background:linear-gradient(180deg,rgba(243,179,82,.06),rgba(243,179,82,0) 60%),var(--panel)}
  .bcard .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
  .bcard .lbl.s{color:var(--signal)}
  .bcard .lbl.w{color:var(--warn)}
  .bcard .name{font-size:13.5px;font-weight:500;line-height:1.35;margin-bottom:10px}
  .bcard .stat{font-family:'JetBrains Mono',monospace;font-size:18px}
  .bcard .stat.minus{color:var(--signal)}
  .bcard .meta{font-size:11px;color:var(--faint);margin-top:6px}

  .finding{border:1px solid var(--line);background:var(--panel);border-radius:8px;overflow:hidden;margin-top:10px}
  .finding[open]{box-shadow:0 0 0 1px var(--line)}
  .finding summary{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
    cursor:pointer;list-style:none}
  .finding summary::-webkit-details-marker{display:none}
  .finding[open] summary{border-bottom:1px solid var(--line)}
  .finding .l{display:flex;align-items:center;gap:12px}
  .ic-dot{width:8px;height:8px;border-radius:50%}
  .ic-dot.s{background:var(--signal);box-shadow:0 0 0 4px rgba(239,92,92,.15)}
  .ic-dot.w{background:var(--warn);box-shadow:0 0 0 4px rgba(243,179,82,.15)}
  .finding-name{font-size:13px;font-weight:500}
  .finding-tag{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:2px 7px;border-radius:99px}
  .finding-tag.s{color:var(--signal);background:var(--signal-soft)}
  .finding-tag.w{color:var(--warn);background:var(--warn-soft)}
  .finding .r{display:flex;gap:14px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
  .finding .body{padding:0 16px 16px}
  .rule-quote{margin:8px 0 14px;padding:10px 12px;background:var(--panel-2);
    border-left:2px solid var(--brand);border-radius:0 6px 6px 0;font-size:12px;color:var(--muted)}

  .trade-table{font-family:'JetBrains Mono',monospace;font-size:11.5px}
  .trade-table th{padding:8px 10px}
  .trade-table td{padding:9px 10px}
  .trade-table .row-flag td:first-child{box-shadow:inset 2px 0 0 var(--signal)}
  .trade-table .sym{color:var(--ink)}
  .trade-table .num{text-align:right;color:var(--ink)}
  .trade-table .num.minus{color:var(--signal)}
  .trade-table .num.plus{color:var(--ok)}

  .toggle{appearance:none;width:30px;height:16px;background:var(--line-strong);border-radius:99px;
    position:relative;cursor:pointer;transition:.15s;margin:0}
  .toggle::after{content:"";position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.15s}
  .toggle:checked{background:var(--brand)}
  .toggle:checked::after{left:16px}

  .decide{position:sticky;bottom:14px;display:flex;justify-content:space-between;align-items:center;
    padding:14px 18px;border-radius:10px;background:rgba(15,18,26,.95);backdrop-filter:blur(10px);
    border:1px solid var(--line);box-shadow:0 8px 28px rgba(0,0,0,.4);margin-top:18px;z-index:5}
  .decide .total{display:flex;gap:24px;align-items:center;font-size:12.5px;color:var(--muted)}
  .decide .total b{color:var(--ink);font-family:'JetBrains Mono',monospace}

  .upload-zone{background:var(--bg-elev);border:1px dashed var(--line-strong);border-radius:10px;
    padding:48px 16px;text-align:center;cursor:pointer;transition:.15s}
  .upload-zone:hover{background:var(--panel-2)}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:24px}
  .modal{background:#fff;color:#0a0d14;border-radius:8px;width:100%;max-width:760px;max-height:90vh;
    overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;
    border-bottom:1px solid #e5e7eb;background:#fafafa}
  .modal-header .x{cursor:pointer;color:#5b6470;font-size:18px;padding:4px 8px}

  .pdf-doc{background:#fff;color:#0a0d14;font-family:'Inter',sans-serif;padding:48px;position:relative}
  .pdf-doc::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:#E1FFA0}
  .pdf-doc h1{font-size:18px;margin:0 0 4px;letter-spacing:-.3px}
  .pdf-doc .pdf-eyebrow{font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:#959aa2;margin-bottom:4px;font-weight:500}
  .pdf-doc .pdf-sub{font-size:10px;color:#5b6470;margin-bottom:16px}
  .pdf-doc .pdf-header{display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid #e5e7eb;padding-bottom:14px;margin-bottom:24px}
  .pdf-doc .pdf-brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:12px}
  .pdf-doc .pdf-brand-mark{width:14px;height:14px;background:#E1FFA0;border-radius:3px}
  .pdf-doc .pdf-section{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:#959aa2;
    font-weight:600;border-bottom:.5px solid #e5e7eb;padding-bottom:6px;margin-bottom:10px;margin-top:18px}
  .pdf-doc .pdf-finding{border:.5px solid #e5e7eb;padding:12px;margin-bottom:10px;border-radius:2px;border-left:2px solid #c43c2e}
  .pdf-doc .pdf-finding-h{display:flex;justify-content:space-between;margin-bottom:6px}
  .pdf-doc .pdf-finding-h .name{font-size:11px;font-weight:600}
  .pdf-doc .pdf-finding-h .tag{font-size:8px;letter-spacing:.8px;text-transform:uppercase;font-weight:600;color:#c43c2e}
  .pdf-doc .pdf-finding-body{font-size:9.5px;color:#5b6470;line-height:1.5;margin-top:4px;margin-bottom:8px;white-space:pre-wrap}
  .pdf-doc .pdf-table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:9px;margin-top:6px}
  .pdf-doc .pdf-table th{font-size:8px;color:#959aa2;text-transform:uppercase;letter-spacing:.6px;
    padding:5px 0;border-bottom:.5px solid #e5e7eb;background:transparent;font-weight:500;text-align:left}
  .pdf-doc .pdf-table td{padding:5px 0;border-bottom:.5px solid #e5e7eb;color:#0a0d14;background:transparent}
  .pdf-doc .pdf-figs{display:flex;flex-wrap:wrap;border-top:.5px solid #e5e7eb;margin-top:12px;padding-top:10px}
  .pdf-doc .pdf-fig{width:33.33%}
  .pdf-doc .pdf-fig-l{font-size:8px;color:#959aa2;text-transform:uppercase;letter-spacing:.8px}
  .pdf-doc .pdf-fig-v{font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:2px}
  .pdf-doc .pdf-fig-v.signal{color:#c43c2e}
  .pdf-doc .pdf-fig-v.ok{color:#2f8a5e}
  .pdf-doc .pdf-appeals{margin-top:24px;padding:12px;background:#fafafa;border:.5px solid #e5e7eb}
  .pdf-doc .pdf-appeals h3{font-size:10px;font-weight:600;margin:0 0 4px}
  .pdf-doc .pdf-appeals p{font-size:9px;color:#5b6470;line-height:1.5;margin:0}
  .pdf-doc .pdf-footer{font-size:8px;color:#959aa2;font-family:'JetBrains Mono',monospace;
    border-top:.5px solid #e5e7eb;padding-top:8px;margin-top:24px;display:flex;justify-content:space-between}

  .tabs{display:flex;gap:1px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .tabs a{padding:10px 14px;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabs a:hover{color:var(--ink)}
  .tabs a.active{color:var(--ink);border-bottom-color:var(--brand)}

  .fade-in{animation:fade-in 200ms ease-out both}
  @keyframes fade-in{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ─── Atlas Funded — single-file interactive demo ────────────────────────
 * Real CSV parser + rules engine. Per-case isolation. No example-data clones.
 * Brand: #E1FFA0 on #0b0d12. Reviewer: Cian.
 * ───────────────────────────────────────────────────────────────────────── */

const FMT_USD = new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', minimumFractionDigits:2 });
const fmtCents = (c, opts={}) => {
  const n = (c||0) / 100;
  if (opts.compact && Math.abs(n) >= 1000) {
    const k = n/1000;
    return '$' + (k % 1 === 0 ? k.toFixed(0) : k.toFixed(1)) + 'k';
  }
  const s = FMT_USD.format(n);
  return opts.sign === 'always' && c > 0 ? '+' + s : s;
};

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let session = { email:'cian@atlasfunded.com', name:'Cian', role:'SENIOR_REVIEWER' };

let allowedEmails = [
  { email:'cian@atlasfunded.com',  addedAt:'2026-01-04', addedBy:'admin' },
  { email:'admin@atlasfunded.com', addedAt:'2026-01-01', addedBy:'system' },
  { email:'ops@atlasfunded.com',   addedAt:'2026-02-12', addedBy:'cian' },
];
let users = [
  { id:'u1', name:'Cian',           email:'cian@atlasfunded.com',  role:'SENIOR_REVIEWER' },
  { id:'u2', name:'Bootstrap Admin',email:'admin@atlasfunded.com', role:'ADMIN' },
  { id:'u3', name:'Ops Reviewer',   email:'ops@atlasfunded.com',   role:'REVIEWER' },
];

// Atlas account types — daily DD / max DD. Editable by admin.
let accountTypes = {
  INSTANT_FUNDED: { label:'Instant Funded', dailyDd:0.03, maxDd:0.06 },
  ONE_STEP:       { label:'1 Step',         dailyDd:0.04, maxDd:0.08 },
  ONE_STEP_PRO:   { label:'1 Step Pro',     dailyDd:0.03, maxDd:0.06 },
  TWO_STEP:       { label:'2 Step',         dailyDd:0.05, maxDd:0.10 },
  TWO_STEP_PRO:   { label:'2 Step Pro',     dailyDd:0.05, maxDd:0.08 },
  THREE_STEP:     { label:'3 Step',         dailyDd:0.04, maxDd:0.08 },
  ALL_ACCESS:     { label:'All Access',     dailyDd:0.03, maxDd:0.06 },
};

// Atlas leverage table — by asset class × phase. NOT user-editable here.
const LEVERAGE_TABLE = {
  FOREX:       { PHASE_1: 100, FUNDED: 50 },
  INDICES:     { PHASE_1: 20,  FUNDED: 10 },
  COMMODITIES: { PHASE_1: 20,  FUNDED: 10 },
  CRYPTO:      { PHASE_1: 2,   FUNDED: 1  },
};

const CONTRACT_SIZE_TABLE = {
  EURUSD:100000, GBPUSD:100000, USDJPY:100000, USDCHF:100000, AUDUSD:100000,
  USDCAD:100000, NZDUSD:100000, EURGBP:100000, EURJPY:100000, GBPJPY:100000,
  AUDJPY:100000, EURAUD:100000,
  XAUUSD:100, XAGUSD:5000,
  NAS100:1, US30:1, SPX500:1, GER40:1, UK100:1, JPN225:1,
  USOIL:1000, UKOIL:1000,
  BTCUSD:1, ETHUSD:1,
};

function classifyAsset(symbol) {
  const s = String(symbol).toUpperCase();
  if (/^(BTC|ETH|XRP|LTC|BCH|ADA|DOT|SOL|AVAX|MATIC|LINK)/.test(s) || s.endsWith('USDT')) return 'CRYPTO';
  if (s.startsWith('XAU') || s.startsWith('XAG') || s.startsWith('XPT') || s.startsWith('XPD')) return 'COMMODITIES';
  if (s.includes('OIL') || s === 'WTI' || s === 'BRENT' || s.includes('NATGAS')) return 'COMMODITIES';
  if (/^(NAS|US30|US500|SPX|GER|UK1|JPN|FTSE|DAX|DOW|NDX|HK50|AUS200|FRA40|EUSTX)/.test(s)) return 'INDICES';
  return 'FOREX';
}
function getLeverage(symbol, phase) { return LEVERAGE_TABLE[classifyAsset(symbol)]?.[phase] ?? 1; }

const CURRENCY_AFFECTS = {
  USD:['EURUSD','GBPUSD','USDJPY','USDCHF','AUDUSD','USDCAD','NZDUSD','XAUUSD','XAGUSD','NAS100','US30','SPX500','USOIL'],
  EUR:['EURUSD','EURGBP','EURJPY','EURAUD','GER40'],
  GBP:['GBPUSD','GBPJPY','EURGBP','UK100'],
  JPY:['USDJPY','EURJPY','GBPJPY','AUDJPY','JPN225'],
  AUD:['AUDUSD','EURAUD','AUDJPY'], CAD:['USDCAD'], CHF:['USDCHF'], NZD:['NZDUSD'],
};

/* ─── helpers ──────────────────────────────────────────────────────────── */
function utcDayOf(ms){const d=new Date(ms);return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;}
function durString(s){if(!Number.isFinite(s)||s<=0)return '0s';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;const p=[];if(h)p.push(h+'h');if(h||m)p.push(m+'m');p.push(sec+'s');return p.join(' ');}
function isoUtcShort(ms){const d=new Date(ms);const day=String(d.getUTCDate()).padStart(2,'0');const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()];const time=`${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')}`;return `${day} ${mon} ${time}`;}
function formatDeltaSeconds(seconds){const sign=seconds>=0?'after':'before';const abs=Math.abs(seconds);const m=Math.floor(abs/60);const s=abs%60;const dur=m>0?`${m}m ${s}s`:`${s}s`;return `${dur} ${sign} release`;}

/* ─── CSV parser + engine ──────────────────────────────────────────────── */
function parseCsvLine(line){const out=[];let cur='';let q=false;for(let i=0;i<line.length;i++){const c=line[i];if(q){if(c==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(c==='"')q=false;else cur+=c;}else if(c==='"')q=true;else if(c===','){out.push(cur);cur='';}else cur+=c;}out.push(cur);return out;}
function parseCsvText(raw){const text=raw.charCodeAt(0)===0xFEFF?raw.slice(1):raw;const lines=text.split(/\r?\n/).filter(l=>l.length>0);if(lines.length<1)throw new Error('empty CSV');const headers=parseCsvLine(lines[0]);const required=['account','account_user_email','account_size','uid','direction','profit','volume','close_volume','symbol','commission','swap','open_time','open_price','close_time','close_price'];const missing=required.filter(c=>!headers.includes(c));if(missing.length)throw new Error('missing columns: '+missing.join(', '));const rows=[];for(let i=1;i<lines.length;i++){const f=parseCsvLine(lines[i]);const r={};for(let j=0;j<headers.length;j++)r[headers[j]]=f[j]??'';rows.push(r);}return rows;}
function parseMoneyToCents(s){const cleaned=String(s??'').replace(/[$,£€¥\s]/g,'');if(!cleaned)return 0;const n=Number(cleaned);return Number.isFinite(n)?Math.round(n*100):0;}
function parseUtcMs(s){const t=String(s??'').trim();if(!t)return NaN;const hasTz=/Z$|[+-]\d{2}:?\d{2}$/.test(t);const candidate=hasTz?t.replace(' ','T'):t.replace(' ','T')+'Z';return Date.parse(candidate);}

function csvRowToTrade(row){
  const openMs=parseUtcMs(row.open_time);
  const closeMs=parseUtcMs(row.close_time);
  return {
    uid:String(row.uid).trim(), symbol:String(row.symbol).trim(),
    direction:Number(row.direction),
    profitCents:parseMoneyToCents(row.profit),
    commissionCents:parseMoneyToCents(row.commission),
    swapCents:parseMoneyToCents(row.swap),
    volume:Number(row.volume)||0, closeVolume:Number(row.close_volume)||0,
    openTimeMs:openMs, closeTimeMs:closeMs,
    openPrice:Number(row.open_price)||0, closePrice:Number(row.close_price)||0,
    durationSeconds:Math.max(0, Math.floor((closeMs-openMs)/1000)),
  };
}

function detectAccountTypeFromString(accountStr){
  const s=String(accountStr).toLowerCase();
  if (s.includes('instant funded')||s.includes('instant')) return 'INSTANT_FUNDED';
  if (s.includes('1 step pro')||s.includes('one step pro')) return 'ONE_STEP_PRO';
  if (s.includes('2 step pro')||s.includes('two step pro')) return 'TWO_STEP_PRO';
  if (s.includes('3 step')||s.includes('three step')) return 'THREE_STEP';
  if (s.includes('1 step')||s.includes('one step')) return 'ONE_STEP';
  if (s.includes('2 step')||s.includes('two step')) return 'TWO_STEP';
  if (s.includes('all access')) return 'ALL_ACCESS';
  return 'INSTANT_FUNDED';
}

/* Rule 1 — Sub-3-min — DEDUCTION (winners only). */
function runSubThreeMin(trades, cutoffSec){
  const off=trades.filter(t=>t.durationSeconds<=cutoffSec && t.profitCents>0);
  if(off.length===0) return null;
  off.sort((a,b)=>a.closeTimeMs-b.closeTimeMs);
  const total=off.reduce((s,t)=>s+t.profitCents,0);
  return {
    id:'b-sub3', ruleKey:'SUB_3_MIN', kind:'deduction', applied:true,
    suggestedDeductionCents:total,
    trades:off.map(t=>({uid:t.uid,symbol:t.symbol,
      open:isoUtcShort(t.openTimeMs),close:isoUtcShort(t.closeTimeMs),
      openIso:new Date(t.openTimeMs).toISOString(),closeIso:new Date(t.closeTimeMs).toISOString(),
      dur:durString(t.durationSeconds),profit:t.profitCents})),
  };
}

/* Rule 2 — Risk Exposure Breach — flag-only, one finding per (symbol, day). */
function runConcentratedDailyLoss(trades, ctx, multiplier){
  const groups=new Map();
  for(const t of trades){
    const day=utcDayOf(t.closeTimeMs);
    const key=`${t.symbol}|${day}`;
    if(!groups.has(key)) groups.set(key,[]);
    groups.get(key).push(t);
  }
  const thresholdCents=Math.round(ctx.balanceCents*ctx.dailyDd*multiplier);
  const findings=[];
  const keys=[...groups.keys()].sort((a,b)=>{const[as,ad]=a.split('|');const[bs,bd]=b.split('|');if(ad!==bd)return ad<bd?-1:1;return as<bs?-1:1;});
  for(const key of keys){
    const ts=groups.get(key);
    let netLoss=0;
    for(const t of ts) if(t.profitCents<0) netLoss+=-t.profitCents;
    if(netLoss<=thresholdCents) continue;
    const[symbol,date]=key.split('|');
    const sorted=[...ts].sort((a,b)=>a.closeTimeMs-b.closeTimeMs);
    findings.push({
      id:`b-cdl-${date}-${symbol}`, ruleKey:'CONCENTRATED_DAILY_LOSS',
      kind:'flag', applied:true, suggestedDeductionCents:0,
      meta:{symbol,date,netLoss,threshold:thresholdCents,overBy:netLoss-thresholdCents},
      trades:sorted.map(t=>({uid:t.uid,symbol:t.symbol,
        open:isoUtcShort(t.openTimeMs),close:isoUtcShort(t.closeTimeMs),
        openIso:new Date(t.openTimeMs).toISOString(),closeIso:new Date(t.closeTimeMs).toISOString(),
        dur:durString(t.durationSeconds),profit:t.profitCents})),
    });
  }
  return findings;
}

/* Rule 3 — Tick scalping cluster — flag-only. */
function runTickScalping(trades, clusterSize, windowSec){
  if(trades.length<clusterSize) return [];
  const sorted=[...trades].sort((a,b)=>a.openTimeMs-b.openTimeMs||(a.uid<b.uid?-1:1));
  const candidates=[];
  for(let i=0;i<sorted.length;i++){
    const win=[sorted[i]];
    for(let j=i+1;j<sorted.length;j++){
      if(sorted[j].openTimeMs-sorted[i].openTimeMs<=windowSec*1000) win.push(sorted[j]);
      else break;
    }
    if(win.length>=clusterSize) candidates.push(win);
  }
  const merged=[]; let cur=null, curUids=new Set();
  for(const c of candidates){
    if(!cur){cur=[...c]; curUids=new Set(c.map(t=>t.uid)); continue;}
    const overlap=c.some(t=>curUids.has(t.uid));
    if(overlap) for(const t of c) if(!curUids.has(t.uid)){cur.push(t); curUids.add(t.uid);}
    else {merged.push(cur); cur=[...c]; curUids=new Set(c.map(t=>t.uid));}
  }
  if(cur) merged.push(cur);
  return merged.map((cluster,i)=>{
    const start=cluster[0].openTimeMs, end=cluster[cluster.length-1].openTimeMs;
    return {
      id:`b-tick-${i}-${start}`, ruleKey:'TICK_SCALPING_CLUSTER',
      kind:'flag', applied:true, suggestedDeductionCents:0,
      meta:{windowStart:isoUtcShort(start),windowEnd:isoUtcShort(end),
        span:durString(Math.floor((end-start)/1000))},
      trades:cluster.map(t=>({uid:t.uid,symbol:t.symbol,
        open:isoUtcShort(t.openTimeMs),close:isoUtcShort(t.closeTimeMs),
        openIso:new Date(t.openTimeMs).toISOString(),closeIso:new Date(t.closeTimeMs).toISOString(),
        dur:durString(t.durationSeconds),profit:t.profitCents})),
    };
  });
}

/* Rule 4 — Excessive margin — DEDUCTION (winners only). Asset-class × phase leverage. */
function runExcessiveMargin(trades, ctx, maxFraction){
  // Atlas rule: CUMULATIVE simultaneous-open-position margin > 80% of balance is a breach.
  // Always uses FUNDED leverage (the stricter, real-broker side) regardless of evaluation phase.
  // Decorate trades with margin metadata.
  const decorated=trades.map(t=>{
    const cs=CONTRACT_SIZE_TABLE[t.symbol] ?? 100000;
    const assetClass=classifyAsset(t.symbol);
    const leverage=LEVERAGE_TABLE[assetClass]?.FUNDED ?? 0;
    const notionalCents=Math.round(t.volume*cs*t.openPrice*100);
    const marginCents=leverage>0 ? Math.round(notionalCents/leverage) : 0;
    return {...t, leverage, assetClass, marginCents};
  });
  // Build a sorted event timeline of opens (+) and closes (-) and sweep through, tracking
  // cumulative margin and which trades are open at any moment > threshold.
  const events=[];
  for(const t of decorated){
    events.push({tMs:t.openTimeMs,  delta:+t.marginCents, uid:t.uid, kind:'open'});
    events.push({tMs:t.closeTimeMs, delta:-t.marginCents, uid:t.uid, kind:'close'});
  }
  // closes process before opens at the same timestamp so a closing trade clears its margin first.
  events.sort((a,b)=>(a.tMs-b.tMs) || ((a.kind==='close'?-1:1) - (b.kind==='close'?-1:1)));
  const open=new Map();
  const flaggedUids=new Set();
  const peakByUid=new Map();
  let cum=0;
  for(const e of events){
    cum+=e.delta;
    if(e.kind==='open') open.set(e.uid,true);
    const fraction=ctx.balanceCents>0 ? cum/ctx.balanceCents : 0;
    if(fraction>maxFraction){
      for(const uid of open.keys()){
        flaggedUids.add(uid);
        const prev=peakByUid.get(uid)??0;
        if(fraction>prev) peakByUid.set(uid,fraction);
      }
    }
    if(e.kind==='close') open.delete(e.uid);
  }
  const flagged=decorated
    .filter(t=>flaggedUids.has(t.uid))
    .map(t=>({...t, fraction:peakByUid.get(t.uid)??0}));
  if(flagged.length===0) return null;
  flagged.sort((a,b)=>a.closeTimeMs-b.closeTimeMs);
  const winners=flagged.filter(t=>t.profitCents>0);
  const losers=flagged.filter(t=>t.profitCents<=0);
  const fmtRow=t=>({uid:t.uid,symbol:t.symbol,
    open:isoUtcShort(t.openTimeMs),close:isoUtcShort(t.closeTimeMs),
    openIso:new Date(t.openTimeMs).toISOString(),closeIso:new Date(t.closeTimeMs).toISOString(),
    dur:durString(t.durationSeconds),profit:t.profitCents,
    notional:`peak ${(t.fraction*100).toFixed(0)}% cumulative margin · 1:${t.leverage} ${t.assetClass} (Funded)`});

  if(winners.length===0){
    return {
      id:'b-margin', ruleKey:'EXCESSIVE_MARGIN_USAGE', kind:'flag', applied:false,
      suggestedDeductionCents:0,
      meta:{flaggedTotal:flagged.length, winningCount:0, losingCount:losers.length,
        threshold:`${(maxFraction*100).toFixed(0)}% of margin`,
        note:'All flagged trades closed in loss — no deduction is possible.'},
      trades:[], losersForContext:losers.map(fmtRow),
    };
  }
  const total=winners.reduce((s,t)=>s+t.profitCents,0);
  return {
    id:'b-margin', ruleKey:'EXCESSIVE_MARGIN_USAGE', kind:'deduction', applied:true,
    suggestedDeductionCents:total,
    meta:{flaggedTotal:flagged.length, winningCount:winners.length, losingCount:losers.length,
      threshold:`${(maxFraction*100).toFixed(0)}% of margin`},
    trades:winners.map(fmtRow), losersForContext:losers.map(fmtRow),
  };
}

/* Rule 5 — News trading — flag-only, ±windowSec around HIGH-impact events. */
function runNewsTradingRule(trades, events, windowSec){
  // Atlas rule: ALL HIGH-impact (red-folder) news events flag any trade whose OPEN or CLOSE
  // falls within ±windowSec, regardless of currency-affects mapping. The currency-affects
  // table is no longer used for matching — it's metadata only.
  const byEvent=new Map();
  for(const ev of events){
    if(ev.impact!=='HIGH') continue;
    const evMs=Date.parse(ev.timeUtc);
    for(const t of trades){
      const dOpen=t.openTimeMs-evMs, dClose=t.closeTimeMs-evMs;
      const matchedOn=Math.abs(dOpen)<=windowSec*1000?'OPEN'
                     :Math.abs(dClose)<=windowSec*1000?'CLOSE':null;
      if(!matchedOn) continue;
      const delta=matchedOn==='OPEN'?dOpen:dClose;
      if(!byEvent.has(ev.id)) byEvent.set(ev.id,{event:ev,rows:[]});
      byEvent.get(ev.id).rows.push({uid:t.uid,symbol:t.symbol,
        open:isoUtcShort(t.openTimeMs),close:isoUtcShort(t.closeTimeMs),
        openIso:new Date(t.openTimeMs).toISOString(),closeIso:new Date(t.closeTimeMs).toISOString(),
        eventName:ev.name,eventCurrency:ev.currency,eventTimeIso:ev.timeUtc,eventSource:ev.source,
        matchedOn,deltaSeconds:Math.round(delta/1000),
        dur:durString(t.durationSeconds),profit:t.profitCents});
    }
  }
  return [...byEvent.values()]
    .sort((a,b)=>Date.parse(a.event.timeUtc)-Date.parse(b.event.timeUtc))
    .map(({event,rows})=>({
      id:`b-news-${event.id}`, ruleKey:'NEWS_TRADING', kind:'flag', applied:true,
      suggestedDeductionCents:0,
      meta:{eventCount:1, windowSec, event:`${event.name} · ${event.currency}`},
      trades:rows.sort((a,b)=>a.openIso.localeCompare(b.openIso)),
    }));
}

function buildAggregatesFromTrades(trades){
  if(trades.length===0) return {dailyPnl:[],perSymbolPnl:[],durationHist:[]};
  const daily=new Map();
  for(const t of trades){const d=utcDayOf(t.closeTimeMs); daily.set(d,(daily.get(d)??0)+t.profitCents);}
  const dailyPnl=[...daily.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([d,v])=>({date:d.slice(8,10),v:v/100}));
  const sym=new Map();
  for(const t of trades) sym.set(t.symbol,(sym.get(t.symbol)??0)+t.profitCents);
  const perSymbolPnl=[...sym.entries()].map(([symbol,pnl])=>({symbol,pnl})).sort((a,b)=>Math.abs(b.pnl)-Math.abs(a.pnl));
  const buckets=[
    {lo:0,hi:30,sub3:true},{lo:31,hi:60,sub3:true},{lo:61,hi:120,sub3:true},{lo:121,hi:180,sub3:true},
    {lo:181,hi:300,sub3:false},{lo:301,hi:600,sub3:false},{lo:601,hi:1800,sub3:false},
    {lo:1801,hi:3600,sub3:false},{lo:3601,hi:7200,sub3:false},{lo:7201,hi:21600,sub3:false},
    {lo:21601,hi:86400,sub3:false},{lo:86401,hi:null,sub3:false},
  ].map(b=>({...b,count:0}));
  for(const t of trades){
    for(const b of buckets){
      if(t.durationSeconds>=b.lo && (b.hi===null||t.durationSeconds<=b.hi)){b.count++;break;}
    }
  }
  return {dailyPnl,perSymbolPnl,durationHist:buckets};
}

async function sha256Hex(buf){
  if(!('crypto' in window) || !crypto.subtle) return 'sha256-unavailable';
  const hash=await crypto.subtle.digest('SHA-256', buf);
  return [...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function runRealEngineOnFile(file, c){
  const buf=await file.arrayBuffer();
  const text=new TextDecoder('utf-8').decode(buf);
  const sha=await sha256Hex(buf);
  const rows=parseCsvText(text);
  if(rows.length===0) throw new Error('CSV had no trade rows');

  const accountStr=rows[0].account;
  const accountSizeCents=parseMoneyToCents(rows[0].account_size);
  const traderEmail=String(rows[0].account_user_email||'').toLowerCase().trim();
  const accountType=detectAccountTypeFromString(accountStr);
  const at=accountTypes[accountType];
  if(!at) throw new Error('unknown account type: '+accountType);

  // Account number from account string format "email - [Live Account] Type - 12345"
  const acctNumMatch=accountStr.match(/-\s*(\d+)\s*$/);
  const accountNumber=acctNumMatch?acctNumMatch[1]:'—';

  const trades=rows.map(csvRowToTrade).filter(t=>Number.isFinite(t.openTimeMs)&&Number.isFinite(t.closeTimeMs));
  if(trades.length===0) throw new Error('no parseable trades');

  const ctx={balanceCents:accountSizeCents, dailyDd:at.dailyDd, accountType, phase:c.phase};
  const findings=[];

  const sub3=runSubThreeMin(trades, ruleConfig['sub_3_min.threshold_seconds']);
  if(sub3) findings.push(sub3);

  if(c.phase==='FUNDED'){
    findings.push(...runConcentratedDailyLoss(trades, ctx, ruleConfig['concentrated_daily_loss.per_asset_limit_multiplier']));
    const em=runExcessiveMargin(trades, ctx, ruleConfig['excessive_margin.max_margin_fraction']);
    if(em) findings.push(em);
  }

  findings.push(...runTickScalping(trades,
    ruleConfig['tick_scalping.cluster_size'],
    ruleConfig['tick_scalping.window_seconds']));
  findings.push(...runNewsTradingRule(trades, economicEvents, ruleConfig['news_trading.window_seconds']));

  const aggs=buildAggregatesFromTrades(trades);
  const earliest=Math.min(...trades.map(t=>t.closeTimeMs));
  const latest=Math.max(...trades.map(t=>t.closeTimeMs));
  const totalPnl=trades.reduce((s,t)=>s+t.profitCents,0);

  return {
    findings, aggs,
    upload:{filename:file.name, sha256:sha, rowCount:trades.length,
      dateRangeStart:utcDayOf(earliest), dateRangeEnd:utcDayOf(latest)},
    parsedPnlCents:totalPnl,
    account:{accountStr, accountSizeCents, accountType, traderEmail, accountNumber},
  };
}

const DEDUCTION_RULE_KEYS = new Set(['SUB_3_MIN','EXCESSIVE_MARGIN_USAGE']);
function isDeductionRuleKey(k){return DEDUCTION_RULE_KEYS.has(k);}
function isDeductionKind(b){return b.kind==='deduction' || (isDeductionRuleKey(b.ruleKey) && b.kind!=='flag');}

function ruleLabel(key){
  return ({
    SUB_3_MIN:'Sub-3-minute trades',
    CONCENTRATED_DAILY_LOSS:'Risk exposure breach',
    TICK_SCALPING_CLUSTER:'Tick-scalping cluster',
    EXCESSIVE_MARGIN_USAGE:'Excessive margin usage',
    NEWS_TRADING:'Trading around high-impact news',
  })[key] || key;
}

function ruleInstanceLabel(b){
  const base=ruleLabel(b.ruleKey); const m=b.meta||{};
  if(b.ruleKey==='CONCENTRATED_DAILY_LOSS' && m.symbol && m.date){
    const d=new Date(m.date+'T00:00:00Z');
    const day=String(d.getUTCDate()).padStart(2,'0');
    const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()];
    return `${base} · ${m.symbol} · ${day} ${mon}`;
  }
  if(b.ruleKey==='TICK_SCALPING_CLUSTER' && m.windowStart) return `${base} · ${m.windowStart} UTC`;
  if(b.ruleKey==='NEWS_TRADING' && m.event) return `${base} · ${m.event}`;
  return base;
}

function statusPill(s){
  const m={DRAFT:['Draft','muted'],IN_REVIEW:['In review','warn'],DECIDED:['Decided','ok'],CLOSED:['Closed','muted']};
  const[label,cls]=m[s]||m.DRAFT;
  return `<span class="pill ${cls}">● ${label}</span>`;
}

function renderFinding(c, b){
  const kind=isDeductionKind(b)?'s':'w';
  const trades=b.trades||[];

  const isLocked=!!c.lockedAt;
  return `
    <details class="finding" ${trades.length>0?'open':''}>
      <summary>
        <div class="l">
          <span class="ic-dot ${kind}"></span>
          <span class="finding-name">${ruleInstanceLabel(b)}</span>
          <span class="finding-tag ${kind}">${isDeductionKind(b)?'Deduction':'Manual review'}</span>
        </div>
        <div class="r" onclick="event.stopPropagation()" style="gap:10px">
          <span>${trades.length} trade${trades.length===1?'':'s'}</span>
          <label style="display:flex;align-items:center;gap:6px;font-family:'Inter';font-size:11px;color:var(--muted)">
            <span style="color:var(--faint)">deduct $</span>
            <input type="number" step="0.01" min="0" inputmode="decimal"
              value="${(b.suggestedDeductionCents/100).toFixed(2)}"
              ${isLocked?'disabled':''}
              onclick="event.stopPropagation()"
              onchange="setBreachDeduction('${c.id}','${b.id}',this.value)"
              style="width:90px;background:var(--bg-elev);border:1px solid var(--line-strong);
                border-radius:6px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:11px;
                color:var(--ink);text-align:right" />
            <input type="checkbox" class="toggle" ${b.applied?'checked':''} ${isLocked?'disabled':''}
              onclick="event.stopPropagation()"
              onchange="toggleBreach('${c.id}','${b.id}',this.checked)" />
            apply
          </label>
        </div>
      </summary>
      <div class="body">
        <div class="rule-quote">${escapeHtml(wording.split('\n\n')[0].replace(/\*\*/g,''))}</div>
        ${b.meta?renderBreachMeta(b):''}
        ${renderTradeUidChips(trades)}
        ${b.ruleKey==='NEWS_TRADING' ? renderNewsTradesTable(trades) :
          trades.length>0 ? `
          <table class="trade-table">
            <thead><tr><th>UID</th><th>Symbol</th><th>Open · Close (UTC)</th><th>Duration</th>
              ${b.ruleKey==='EXCESSIVE_MARGIN_USAGE'?'<th>Margin · leverage</th>':''}
              <th style="text-align:right">Profit</th></tr></thead>
            <tbody>
              ${trades.map(t=>`<tr ${isDeductionKind(b)?'class="row-flag"':''}>
                <td>${t.uid}</td>
                <td class="sym">${t.symbol}</td>
                <td>${escapeHtml(t.open)} → ${escapeHtml(t.close)}</td>
                <td>${t.dur}</td>
                ${b.ruleKey==='EXCESSIVE_MARGIN_USAGE'?`<td>${t.notional||''}</td>`:''}
                <td class="num ${t.profit>=0?'plus':'minus'}">${fmtCents(t.profit,{sign:'always'})}</td>
              </tr>`).join('')}
            </tbody>
          </table>`:''}
        ${b.ruleKey==='EXCESSIVE_MARGIN_USAGE' && b.losersForContext?.length>0 ? `
          <div style="margin-top:14px;padding-top:10px;border-top:1px dashed var(--line)">
            <div class="eyebrow" style="margin-bottom:8px">Gambling-pattern context — losing trades (no deduction)</div>
            <table class="trade-table" style="opacity:.7">
              <thead><tr><th>UID</th><th>Symbol</th><th>Open · Close (UTC)</th><th>Duration</th><th>Margin · leverage</th><th style="text-align:right">Loss</th></tr></thead>
              <tbody>${b.losersForContext.map(t=>`<tr><td>${t.uid}</td><td class="sym">${t.symbol}</td><td>${escapeHtml(t.open)} → ${escapeHtml(t.close)}</td><td>${t.dur}</td><td>${t.notional||''}</td><td class="num minus">${fmtCents(t.profit,{sign:'always'})}</td></tr>`).join('')}</tbody>
            </table>
          </div>`:''}
      </div>
    </details>`;
}

function renderBreachMeta(b){
  const m=b.meta;
  if(b.ruleKey==='CONCENTRATED_DAILY_LOSS'){
    return `<div class="mono" style="font-size:11.5px;color:var(--muted);margin-bottom:10px">
      ${m.symbol} · ${m.date} · net loss ${fmtCents(m.netLoss)} · threshold ${fmtCents(m.threshold)} · over by <span style="color:var(--signal)">${fmtCents(m.overBy)}</span>
    </div>`;
  }
  if(b.ruleKey==='TICK_SCALPING_CLUSTER'){
    return `<div class="mono" style="font-size:11.5px;color:var(--muted);margin-bottom:10px">
      Window ${m.windowStart} → ${m.windowEnd} (${m.span}) · ${b.trades.length} trades
    </div>`;
  }
  if(b.ruleKey==='EXCESSIVE_MARGIN_USAGE'){
    const wc=m.winningCount, lc=m.losingCount;
    return `<div class="mono" style="font-size:11.5px;color:var(--muted);margin-bottom:10px">
      Threshold: ${m.threshold||'—'}
      ${typeof wc==='number'?` · ${wc} winning trade${wc===1?'':'s'} deducted`:''}
      ${typeof lc==='number'?` · ${lc} losing trade${lc===1?'':'s'} flagged for gambling pattern (no deduction)`:''}
      ${m.note?`<div style="color:var(--warn);margin-top:4px">${escapeHtml(m.note)}</div>`:''}
    </div>`;
  }
  return '';
}

/* ─── charts ──────────────────────────────────────────────────────────── */
function equityCurveSvg(c){
  if(!c.dailyPnl||c.dailyPnl.length===0) return '<div style="height:140px;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:12px">No data</div>';
  let cum=0; const pts=c.dailyPnl.map(d=>{cum+=d.v; return cum;});
  const W=480,H=140,T=12,B=22;
  const innerH=H-T-B;
  const minY=Math.min(0,...pts), maxY=Math.max(0,...pts);
  const yRange=Math.max(1,maxY-minY);
  const xAt=i=>(i/(pts.length-1||1))*W;
  const yAt=v=>T+innerH-((v-minY)/yRange)*innerH;
  const poly=pts.map((p,i)=>`${xAt(i)},${yAt(p)}`).join(' ');
  const area=`0,${T+innerH} ${poly} ${W},${T+innerH}`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:140px;display:block;overflow:visible">
    <defs><linearGradient id="eq" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#E1FFA0" stop-opacity=".32"/>
      <stop offset="100%" stop-color="#E1FFA0" stop-opacity="0"/></linearGradient></defs>
    <line x1="0" y1="${yAt(0)}" x2="${W}" y2="${yAt(0)}" stroke="#1e242f"/>
    <polygon points="${area}" fill="url(#eq)"/>
    <polyline points="${poly}" fill="none" stroke="#E1FFA0" stroke-width="1.6"/>
    <text x="0" y="${H-4}" class="axis-text">${c.upload?.dateRangeStart||'start'}</text>
    <text x="${W-60}" y="${H-4}" class="axis-text">${c.upload?.dateRangeEnd||'end'}</text>
  </svg>`;
}
function dailyPnlSvg(c){
  if(!c.dailyPnl||c.dailyPnl.length===0) return '<div style="height:140px"></div>';
  const W=480,H=140,T=12,B=22;
  const innerH=H-T-B;
  const maxAbs=Math.max(1,...c.dailyPnl.map(d=>Math.abs(d.v)));
  const barW=(W-c.dailyPnl.length*2)/c.dailyPnl.length;
  const zeroY=T+innerH/2, halfH=innerH/2;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:140px;display:block;overflow:visible">
    <line x1="0" y1="${zeroY}" x2="${W}" y2="${zeroY}" stroke="#1e242f"/>
    ${c.dailyPnl.map((d,i)=>{const h=(Math.abs(d.v)/maxAbs)*halfH;const x=i*(barW+2);const y=d.v>=0?zeroY-h:zeroY;return `<rect x="${x}" y="${y}" width="${Math.max(2,barW)}" height="${Math.max(1,h)}" rx="1" fill="${d.v>=0?'#5fd09b':'#ef5c5c'}"/>`;}).join('')}
  </svg>`;
}
function perSymbolSvg(c){
  if(!c.perSymbolPnl||c.perSymbolPnl.length===0) return '<div style="height:120px"></div>';
  const rows=c.perSymbolPnl;
  const maxAbs=Math.max(1,...rows.map(r=>Math.abs(r.pnl)));
  const W=320, rowH=16, labelW=56, valueW=64;
  const barX=labelW+2, barW=W-labelW-valueW-6;
  return `<svg viewBox="0 0 ${W} ${rows.length*rowH}" style="width:100%;height:${rows.length*rowH}px;display:block;overflow:visible">
    ${rows.map((r,i)=>{const y=i*rowH;const w=(Math.abs(r.pnl)/maxAbs)*barW;const x=r.pnl<0?barX+barW-w:barX;const fill=r.pnl<0?'#ef5c5c':'#5fd09b';return `
      <text x="0" y="${y+11}" font-family="JetBrains Mono,monospace" font-size="10" fill="#a6acba">${r.symbol}</text>
      <rect x="${x}" y="${y+4}" width="${Math.max(1,w)}" height="9" rx="2" fill="${fill}"/>
      <text x="${W-4}" y="${y+11}" font-family="JetBrains Mono,monospace" font-size="10" fill="${r.pnl<0?'#ef5c5c':'#eef0f4'}" text-anchor="end">${fmtCents(r.pnl,{sign:'always'})}</text>`;}).join('')}
  </svg>`;
}
function durationSvg(c){
  if(!c.durationHist||c.durationHist.length===0) return '<div style="height:140px"></div>';
  const W=320,H=140,T=12,B=22;
  const innerH=H-T-B;
  const max=Math.max(1,...c.durationHist.map(b=>b.count));
  const sub3End=c.durationHist.findIndex(b=>!b.sub3);
  const subBoundaryX=sub3End<0?W:sub3End*(W/c.durationHist.length);
  const barW=(W-c.durationHist.length*2)/c.durationHist.length;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:140px;display:block;overflow:visible">
    <rect x="0" y="0" width="${subBoundaryX}" height="${H-B}" fill="rgba(239,92,92,0.10)"/>
    <line x1="${subBoundaryX}" y1="0" x2="${subBoundaryX}" y2="${H-B}" stroke="#ef5c5c" stroke-dasharray="2 3"/>
    <text x="${subBoundaryX+2}" y="12" font-family="JetBrains Mono,monospace" font-size="10" fill="#ef5c5c">3:00</text>
    ${c.durationHist.map((b,i)=>{const h=(b.count/max)*innerH;const x=i*(barW+2);return `<rect x="${x}" y="${T+innerH-h}" width="${Math.max(2,barW)}" height="${Math.max(1,h)}" rx="1" fill="${b.sub3?'#ef5c5c':'#5fd09b'}"/>`;}).join('')}
  </svg>`;
}

/* ─── Economic Calendar tab ────────────────────────────────────────────── */
function renderCalendar(){
  const sorted=[...economicEvents].sort((a,b)=>Date.parse(a.timeUtc)-Date.parse(b.timeUtc));
  const windowSec=ruleConfig['news_trading.window_seconds'];
  const nowMs=Date.now();
  function matches(ev){
    const out=[];
    for(const c of cases){
      for(const b of (c.breaches||[])){
        for(const t of (b.trades||[])){
          if(!t.openIso) continue;
          const aff=CURRENCY_AFFECTS[ev.currency]||[];
          if(!aff.includes(t.symbol)) continue;
          if(Math.abs(Date.parse(t.openIso)-Date.parse(ev.timeUtc))<=windowSec*1000)
            out.push({caseRef:c.reviewId,caseId:c.id,uid:t.uid,symbol:t.symbol});
        }
      }
    }
    return out;
  }
  return renderShell(`
    <div class="fade-in">
      <div class="crumbs">
        <div>Workspace / <b>Economic calendar</b></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="pill muted">UTC</span>
          <span class="pill signal">RED / HIGH only</span>
          <span class="pill muted">Window ±${windowSec}s</span>
          <span class="pill muted">${economicEvents.length} events · 6 months</span>
        </div>
      </div>
      <div style="margin-bottom:14px">
        <div class="eyebrow">Workspace</div>
        <h1 style="font-size:24px;font-weight:600;margin:6px 0 4px;letter-spacing:-.01em">Economic calendar</h1>
        <p style="color:var(--faint);font-size:12px;margin:0">
          Last 6 months of HIGH-impact (red folder) releases plus upcoming events. Times UTC.
          Sources: <a href="https://www.forexfactory.com/" target="_blank" rel="noopener" style="color:var(--brand)">forexfactory.com</a>
          · <a href="https://uk.investing.com/economic-calendar" target="_blank" rel="noopener" style="color:var(--brand)">investing.com</a>
          · <a href="https://www.myfxbook.com/forex-economic-calendar" target="_blank" rel="noopener" style="color:var(--brand)">myfxbook.com</a>.
        </p>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table>
          <thead><tr><th>Date · Time UTC</th><th>Currency</th><th>Event</th><th>Impact</th><th>Source</th><th>Matched trades</th></tr></thead>
          <tbody>
            ${sorted.map(ev=>{
              const ms=Date.parse(ev.timeUtc), isFuture=ms>nowMs;
              const m=matches(ev);
              const dateStr=ev.timeUtc.slice(0,10)+' · '+ev.timeUtc.slice(11,16);
              return `<tr>
                <td><div class="mono" style="color:var(--ink)">${dateStr} UTC</div>
                  <div class="mono" style="font-size:10.5px;color:var(--faint)">${isFuture?'upcoming':'past'}</div></td>
                <td><span class="pill muted mono">${ev.currency}</span></td>
                <td style="color:var(--ink)">${escapeHtml(ev.name)}</td>
                <td><span class="pill signal">RED</span></td>
                <td><a href="https://${ev.source}" target="_blank" rel="noopener" class="mono" style="color:var(--muted);font-size:11.5px">${ev.source}</a></td>
                <td>${m.length===0?'<span style="color:var(--faint)">—</span>':m.map(x=>`<a href="#/cases/${x.caseId}" class="mono" style="color:var(--brand);font-size:11.5px;margin-right:10px">${x.caseRef} · ${x.symbol} · ${x.uid}</a>`).join('')}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`);
}

/* ─── actions ──────────────────────────────────────────────────────────── */
let pdfCaseId=null;
let signedIn=true;

function toggleBreach(caseId, breachId, applied){
  const c=caseById(caseId); if(!c) return;
  const b=c.breaches.find(x=>x.id===breachId); if(!b) return;
  b.applied=applied;
  c.totalDeductionCents=c.breaches.reduce((s,x)=>s+(x.applied?x.suggestedDeductionCents:0),0);
  c.payableAmountCents=c.reportedPnlCents-c.totalDeductionCents;
  audit('BREACH_TOGGLED',{breachId, ruleKey:b.ruleKey, applied, newTotalDeductionCents:c.totalDeductionCents}, c.id);
  render();
}

function setBreachDeduction(caseId, breachId, dollarsRaw){
  const c=caseById(caseId); if(!c) return;
  const b=c.breaches.find(x=>x.id===breachId); if(!b) return;
  const dollars=Number(dollarsRaw);
  if(!Number.isFinite(dollars)||dollars<0) return;
  const cents=Math.round(dollars*100);
  const before=b.suggestedDeductionCents;
  b.suggestedDeductionCents=cents;
  if(cents>0 && !b.applied) b.applied=true;
  c.totalDeductionCents=c.breaches.reduce((s,x)=>s+(x.applied?x.suggestedDeductionCents:0),0);
  c.payableAmountCents=c.reportedPnlCents-c.totalDeductionCents;
  audit('BREACH_DEDUCTION_SET',{breachId, ruleKey:b.ruleKey, beforeCents:before, afterCents:cents, newTotalDeductionCents:c.totalDeductionCents}, c.id);
  render();
}

function decide(caseId, verdict){
  const c=caseById(caseId); if(!c) return;
  const liveDed=c.breaches.reduce((s,b)=>s+(b.applied?b.suggestedDeductionCents:0),0);
  const seniorThr=ruleConfig['senior_approval.threshold_cents'];
  const requiresSenior=verdict==='REJECT'||verdict==='ESCALATE'||liveDed>seniorThr;
  if(requiresSenior && session.role!=='SENIOR_REVIEWER' && session.role!=='ADMIN'){
    alert(`Senior approval required: ${verdict==='REJECT'?'rejection requires senior sign-off':verdict==='ESCALATE'?'escalation requires senior sign-off':`total deductions ${fmtCents(liveDed)} exceed the $${(seniorThr/100).toFixed(2)} senior threshold`}.`);
    return;
  }
  if(!confirm(`Confirm decision: ${verdict.replaceAll('_',' ')}?\nThis locks the case and is audit-logged.`)) return;
  c.status='DECIDED'; c.lockedAt=new Date().toISOString(); c.decidedAt=c.lockedAt;
  c.decidedBy=session.name; c.reviewer=c.reviewer||session.name;
  c.totalDeductionCents=liveDed;
  c.payableAmountCents=verdict==='REJECT'?0:c.reportedPnlCents-liveDed;
  c.decision={verdict, notes:''};
  audit('DECISION_MADE',{verdict, finalPayableCents:c.payableAmountCents, totalDeductionCents:liveDed, decidedBy:session.name}, c.id);
  render();
}

}

/* ─── master render + form handlers ────────────────────────────────────── */
function render(){
  const root=document.getElementById('app');
  if(!signedIn){
    root.innerHTML=renderSignIn();
    document.getElementById('signInForm')?.addEventListener('submit',e=>{
      e.preventDefault(); signedIn=true; audit('USER_SIGNED_IN',{email:session.email}); render();
    });
    return;
  }

  let body='';
  if(route.startsWith('#/cases/new')) body=renderNewCase();
  else if(route.startsWith('#/cases/')) body=renderCaseDetail(route.split('/')[2]?.split('?')[0]);
  else if(route.startsWith('#/cases')) body=renderCases();
  else if(route.startsWith('#/calendar')) body=renderCalendar();
  else if(route.startsWith('#/admin/rules')) body=renderAdminRules();
  else if(route.startsWith('#/admin/account-types')) body=renderAdminAccountTypes();
  else if(route.startsWith('#/admin/wording')) body=renderAdminWording();
  else if(route.startsWith('#/admin/users')) body=renderAdminUsers();
  else if(route.startsWith('#/admin/audit')) body=renderAdminAudit();
  else body=renderCases();

  root.innerHTML=body+(pdfCaseId?renderPdfModal(caseById(pdfCaseId)):'');

  // New-review flow: one shot — pick phase, drop CSV, engine creates the case.
  document.getElementById('newCaseCsv')?.addEventListener('change', async e=>{
    const file=e.target.files?.[0]; if(!file) return;
    const phaseEl=document.querySelector('input[name="phase"]:checked');
    const phase=phaseEl?phaseEl.value:'FUNDED';
    const pnlEl=document.getElementById('newCasePnl');
    const manualPnlStr=(pnlEl?.value||'').trim();
    const manualPnlCents=manualPnlStr?parseMoneyToCents(manualPnlStr):null;
    const c={
      id:'c'+(cases.length+1)+'-'+Date.now().toString(36),
      reviewId:'AF-2026-001'+String(42+cases.length).padStart(2,'0'),
      traderEmail:'(parsing…)', accountNumber:'—',
      accountSizeCents:0, phase, accountType:'INSTANT_FUNDED',
      reportedPnlCents:0, parsedPnlCents:null, totalDeductionCents:0, payableAmountCents:null,
      status:'DRAFT', createdAt:new Date().toISOString().slice(0,10),
      decidedAt:null, lockedAt:null, reviewer:session.name,
      upload:null, breaches:[], dailyPnl:[], perSymbolPnl:[], durationHist:[],
    };
    cases.unshift(c);
    try {
      const result=await runRealEngineOnFile(file, c);
      // Everything from the CSV — no manual entry needed.
      c.accountSizeCents = result.account.accountSizeCents;
      c.accountType      = result.account.accountType;
      c.traderEmail      = result.account.traderEmail || c.traderEmail;
      c.accountNumber    = result.account.accountNumber || c.accountNumber;
      c.upload           = result.upload;
      c.parsedPnlCents   = result.parsedPnlCents;
      c.reportedPnlCents = (manualPnlCents !== null) ? manualPnlCents : result.parsedPnlCents;   // reviewer-typed value wins; falls back to parsed sum if blank
      c.breaches         = result.findings;
      c.dailyPnl         = result.aggs.dailyPnl;
      c.perSymbolPnl     = result.aggs.perSymbolPnl;
      c.durationHist     = result.aggs.durationHist;
      c.totalDeductionCents = c.breaches.reduce((s,b)=>s+(b.applied?b.suggestedDeductionCents:0),0);
      c.payableAmountCents  = c.reportedPnlCents - c.totalDeductionCents;
      c.status='IN_REVIEW';
      audit('CASE_CREATED_FROM_CSV',{
        reviewId:c.reviewId, traderEmail:c.traderEmail, accountType:c.accountType,
        phase, sha256:c.upload.sha256, rowCount:c.upload.rowCount,
        findingCount:c.breaches.length, deductionCents:c.totalDeductionCents,
      }, c.id);
      go('#/cases/'+c.id);
    } catch (err) {
      // Roll back the half-created case so the user can retry cleanly.
      cases.shift();
      alert('Could not parse / analyse this CSV:\n\n'+err.message);
      render();
    }
  });

  document.getElementById('csvInput')?.addEventListener('change', async e=>{
    const file=e.target.files?.[0]; if(!file) return;
    const c=caseById(route.split('/')[2]); if(!c) return;
    try {
      const result=await runRealEngineOnFile(file, c);
      if(result.account.accountSizeCents) c.accountSizeCents=result.account.accountSizeCents;
      if(result.account.accountType) c.accountType=result.account.accountType;
      if(result.account.traderEmail) c.traderEmail=result.account.traderEmail;
      if(result.account.accountNumber) c.accountNumber=result.account.accountNumber;
      c.upload=result.upload;
      c.parsedPnlCents=result.parsedPnlCents;
      // If reportedPnlCents was 0 / not set, default to parsed.
      if(!c.reportedPnlCents) c.reportedPnlCents=result.parsedPnlCents;
      c.breaches=result.findings;
      c.dailyPnl=result.aggs.dailyPnl;
      c.perSymbolPnl=result.aggs.perSymbolPnl;
      c.durationHist=result.aggs.durationHist;
      c.totalDeductionCents=c.breaches.reduce((s,b)=>s+(b.applied?b.suggestedDeductionCents:0),0);
      c.payableAmountCents=c.reportedPnlCents-c.totalDeductionCents;
      c.status='IN_REVIEW';
      c.reviewer=c.reviewer||session.name;
      audit('UPLOAD_REPLACED_AND_ANALYZED',{
        sha256:c.upload.sha256, rowCount:c.upload.rowCount,
        findingCount:c.breaches.length, deductionCents:c.totalDeductionCents, accountType:c.accountType,
      }, c.id);
      render();
    } catch (err) {
      alert('Could not parse / analyse this CSV:\n\n'+err.message);
    }
  });

  document.getElementById('rulesForm')?.addEventListener('submit', e=>{
    e.preventDefault();
    const f=new FormData(e.target);
    for(const [k,v] of f.entries()){
      if(ruleConfig[k]!==undefined){
        const next=Number(v);
        if(!Number.isNaN(next) && next!==ruleConfig[k]){
          audit('RULE_CONFIG_CHANGED',{key:k, before:ruleConfig[k], after:next});
          ruleConfig[k]=next;
        }
      }
    }
    flash('Rules saved. Next analysis run uses updated thresholds.');
  });

  document.getElementById('accountTypesForm')?.addEventListener('submit', e=>{
    e.preventDefault();
    const f=new FormData(e.target);
    let changed=false;
    for(const [name,raw] of f.entries()){
      const [type,field]=name.split('.');
      const next=Number(raw);
      if(!accountTypes[type]||!Number.isFinite(next)) continue;
      if(accountTypes[type][field]!==next){
        audit('ACCOUNT_TYPE_CONFIG_CHANGED',{accountType:type, [field]:next, before:accountTypes[type][field]});
        accountTypes[type][field]=next;
        changed=true;
      }
    }
    if(changed) flash('Account-type DDs saved.');
    render();
  });

  document.getElementById('wordingForm')?.addEventListener('submit', e=>{
    e.preventDefault();
    const f=new FormData(e.target);
    for(const [k,v] of f.entries()){
      const s=String(v).trim();
      if(s && ruleText[k]!==s){
        audit('RULE_TEXT_CHANGED',{ruleKey:k});
        ruleText[k]=s;
      }
    }
    flash('Wording saved.');
  });

  document.getElementById('addEmailForm')?.addEventListener('submit', e=>{
    e.preventDefault();
    const email=String(new FormData(e.target).get('email')).toLowerCase().trim();
    if(allowedEmails.some(a=>a.email===email)) return;
    allowedEmails.unshift({email, addedAt:new Date().toISOString().slice(0,10), addedBy:session.name});
    audit('ALLOWED_EMAIL_ADDED',{email});
    render();
  });
}

render();
</script>
</body>
</html>
