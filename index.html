<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Atlas Funded — Risk Operations</title>
<link rel="preconnect" href="https://rsms.me" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jetbrains-mono@1.0.6/css/jetbrains-mono.min.css" />
<style>
  :root{
    --bg:#0b0d12; --bg-elev:#0f121a; --panel:#13171f; --panel-2:#171c25;
    --line:#1e242f; --line-strong:#2a3140;
    --ink:#eef0f4; --muted:#a6acba; --faint:#6b7280;
    --brand:#E1FFA0; --brand-ink:#0a0d14;
    --brand-soft:rgba(225,255,160,.13); --brand-line:rgba(225,255,160,.42);
    --signal:#ef5c5c; --signal-soft:rgba(239,92,92,.10);
    --warn:#f3b352;   --warn-soft:rgba(243,179,82,.10);
    --ok:#5fd09b;     --ok-soft:rgba(95,208,155,.10);
    color-scheme: dark;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',-apple-system,system-ui,sans-serif;font-size:13px;line-height:1.5;
    -webkit-font-smoothing:antialiased;min-height:100vh}
  .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;font-feature-settings:"tnum","zero"}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}

  /* layout */
  .app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
  .nav{background:var(--bg-elev);border-right:1px solid var(--line);padding:18px 14px;
    display:flex;flex-direction:column;gap:24px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-.01em;padding:0 4px}
  .brand-mark{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#E1FFA0 0%,#a4d062 100%);position:relative;box-shadow:0 0 0 1px rgba(255,255,255,.06) inset}
  .brand-mark::after{content:"";position:absolute;inset:5px;border-radius:2px;background:rgba(0,0,0,.55)}
  .nav-section h6{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
    margin:0 6px 6px;font-weight:600}
  .nav a{display:flex;align-items:center;justify-content:space-between;color:var(--muted);
    font-size:12.5px;padding:7px 10px;border-radius:6px}
  .nav a:hover{background:var(--panel)}
  .nav a.active{background:var(--brand-soft);color:var(--ink);box-shadow:0 0 0 1px var(--brand-line) inset}
  .nav a .badge{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--faint);background:var(--panel);padding:1px 6px;border-radius:99px}
  .nav a.active .badge{color:var(--brand);background:rgba(225,255,160,.16)}

  .me{margin-top:auto;display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);
    border-radius:8px;background:var(--panel)}
  .me .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#5fd09b,#3a9d6c);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#0b0d12}
  .me .who{font-size:12px}
  .me .who small{display:block;color:var(--faint);font-size:10.5px}

  main{padding:20px 28px 60px;max-width:1280px}

  /* common */
  .eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:500}
  .crumbs{display:flex;align-items:center;justify-content:space-between;color:var(--faint);font-size:12px;margin-bottom:18px}
  .crumbs b{color:var(--muted);font-weight:500}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}
  .pill.warn{background:var(--warn-soft);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(243,179,82,.3)}
  .pill.ok{background:var(--ok-soft);color:var(--ok);box-shadow:inset 0 0 0 1px rgba(95,208,155,.3)}
  .pill.muted{background:var(--panel);color:var(--muted);box-shadow:inset 0 0 0 1px var(--line-strong)}
  .pill.signal{background:var(--signal-soft);color:var(--signal);box-shadow:inset 0 0 0 1px rgba(239,92,92,.3)}

  .btn{padding:8px 14px;border-radius:7px;border:1px solid var(--line-strong);background:var(--panel);
    color:var(--ink);font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:var(--panel-2)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:var(--brand-ink);font-weight:600}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.danger{color:var(--signal);border-color:rgba(239,92,92,.4);background:transparent}
  .btn.danger:hover{background:var(--signal-soft)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px}
  .card h3{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
    font-weight:600;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center}
  .card h3 .delta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ok);
    font-weight:500;letter-spacing:0;text-transform:none}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;font-weight:500;color:var(--faint);font-size:10.5px;
    letter-spacing:.08em;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--line);
    background:var(--panel-2)}
  td{padding:11px 14px;border-bottom:1px solid var(--line);color:var(--muted);vertical-align:middle}
  tr:last-child td{border-bottom:0}
  td.num{text-align:right;color:var(--ink)}

  /* sign-in */
  .signin-shell{display:grid;place-items:center;min-height:100vh;background:var(--bg)}
  .signin{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:28px}
  .signin .brand{margin-bottom:24px}
  .signin h1{font-size:20px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em}
  .signin p{margin:0 0 24px;color:var(--faint);font-size:12px}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:500}
  .field input,.field select,.field textarea{background:var(--bg-elev);border:1px solid var(--line-strong);
    border-radius:6px;padding:9px 12px;font-size:13px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .field .help{font-size:11px;color:var(--faint)}

  /* hero on case detail */
  .hero{background:linear-gradient(180deg,rgba(225,255,160,.05),rgba(225,255,160,0) 65%),var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:18px}
  .hero h1{font-size:20px;font-weight:600;letter-spacing:-.01em;margin:0 0 4px}
  .hero .sub{color:var(--faint);font-size:12.5px}
  .hero-meta{display:flex;flex-wrap:wrap;gap:18px;margin-top:14px;font-size:12px;color:var(--muted)}
  .hero-meta b{color:var(--faint);font-weight:500;margin-right:6px}

  .verdict-banner{display:flex;align-items:center;gap:14px;margin-top:16px;padding:14px 16px;
    border-radius:8px;background:var(--signal-soft);box-shadow:inset 0 0 0 1px rgba(239,92,92,.25)}
  .verdict-banner.ok{background:var(--ok-soft);box-shadow:inset 0 0 0 1px rgba(95,208,155,.25)}
  .verdict-banner .ic{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;
    justify-content:center;font-weight:700;background:rgba(239,92,92,.18);color:var(--signal)}
  .verdict-banner.ok .ic{background:rgba(95,208,155,.18);color:var(--ok)}
  .verdict-banner .t{font-size:13px}
  .verdict-banner .t b{font-weight:600;color:var(--signal)}
  .verdict-banner.ok .t b{color:var(--ok)}
  .verdict-banner .t small{display:block;color:var(--muted);font-size:11.5px;margin-top:2px}

  /* charts */
  .charts-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:14px;margin-top:14px}
  .charts-grid .span2{grid-column:span 2}
  .axis-text{font-family:'JetBrains Mono',monospace;font-size:9.5px;fill:var(--faint)}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--faint);margin-top:8px}
  .legend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}

  /* breach card grid */
  .bcards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
  .bcard{position:relative;padding:16px;border-radius:8px;background:var(--panel);
    border:1px solid var(--line);overflow:hidden}
  .bcard.signal{border-color:rgba(239,92,92,.28);background:linear-gradient(180deg,rgba(239,92,92,.06),rgba(239,92,92,0) 60%),var(--panel)}
  .bcard.warn{border-color:rgba(243,179,82,.28);background:linear-gradient(180deg,rgba(243,179,82,.06),rgba(243,179,82,0) 60%),var(--panel)}
  .bcard .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
  .bcard .lbl.s{color:var(--signal)}
  .bcard .lbl.w{color:var(--warn)}
  .bcard .name{font-size:13.5px;font-weight:500;line-height:1.35;margin-bottom:10px}
  .bcard .stat{font-family:'JetBrains Mono',monospace;font-size:18px}
  .bcard .stat.minus{color:var(--signal)}
  .bcard .meta{font-size:11px;color:var(--faint);margin-top:6px}

  /* finding sections */
  .finding{border:1px solid var(--line);background:var(--panel);border-radius:8px;overflow:hidden;margin-top:10px}
  .finding[open]{box-shadow:0 0 0 1px var(--line)}
  .finding summary{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
    cursor:pointer;list-style:none}
  .finding summary::-webkit-details-marker{display:none}
  .finding[open] summary{border-bottom:1px solid var(--line)}
  .finding .l{display:flex;align-items:center;gap:12px}
  .ic-dot{width:8px;height:8px;border-radius:50%}
  .ic-dot.s{background:var(--signal);box-shadow:0 0 0 4px rgba(239,92,92,.15)}
  .ic-dot.w{background:var(--warn);box-shadow:0 0 0 4px rgba(243,179,82,.15)}
  .finding-name{font-size:13px;font-weight:500}
  .finding-tag{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:2px 7px;border-radius:99px}
  .finding-tag.s{color:var(--signal);background:var(--signal-soft)}
  .finding-tag.w{color:var(--warn);background:var(--warn-soft)}
  .finding .r{display:flex;gap:14px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
  .finding .r .deduct{color:var(--signal)}
  .finding .r .flag{color:var(--faint)}
  .finding .body{padding:0 16px 16px}
  .rule-quote{margin:8px 0 14px;padding:10px 12px;background:var(--panel-2);
    border-left:2px solid var(--brand);border-radius:0 6px 6px 0;font-size:12px;color:var(--muted)}

  /* per-trade table inside finding */
  .trade-table{font-family:'JetBrains Mono',monospace;font-size:11.5px}
  .trade-table th{padding:8px 10px}
  .trade-table td{padding:9px 10px}
  .trade-table .row-flag td:first-child{box-shadow:inset 2px 0 0 var(--signal)}
  .trade-table .sym{color:var(--ink)}
  .trade-table .num{text-align:right;color:var(--ink)}
  .trade-table .num.minus{color:var(--signal)}
  .trade-table .num.plus{color:var(--ok)}

  .toggle{appearance:none;width:30px;height:16px;background:var(--line-strong);border-radius:99px;
    position:relative;cursor:pointer;transition:.15s;margin:0}
  .toggle::after{content:"";position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.15s}
  .toggle:checked{background:var(--brand)}
  .toggle:checked::after{left:16px}

  /* sticky decision bar */
  .decide{position:sticky;bottom:14px;display:flex;justify-content:space-between;align-items:center;
    padding:14px 18px;border-radius:10px;background:rgba(15,18,26,.95);backdrop-filter:blur(10px);
    border:1px solid var(--line);box-shadow:0 8px 28px rgba(0,0,0,.4);margin-top:18px;z-index:5}
  .decide .total{display:flex;gap:24px;align-items:center;font-size:12.5px;color:var(--muted)}
  .decide .total b{color:var(--ink);font-family:'JetBrains Mono',monospace}

  /* upload zone */
  .upload-zone{background:var(--bg-elev);border:1px dashed var(--line-strong);border-radius:10px;
    padding:48px 16px;text-align:center;cursor:pointer;transition:.15s}
  .upload-zone:hover{background:var(--panel-2)}
  .upload-zone.drag{background:var(--brand-soft);border-color:var(--brand)}

  /* progress */
  .progress{display:flex;flex-direction:column;gap:10px;padding:24px}
  .step{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted)}
  .step.done{color:var(--ink)}
  .step .dot{width:18px;height:18px;border-radius:50%;background:var(--panel-2);
    border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;font-size:10px}
  .step.done .dot{background:var(--ok);border-color:var(--ok);color:var(--brand-ink)}
  .step.active .dot{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:24px}
  .modal{background:#fff;color:#0a0d14;border-radius:8px;width:100%;max-width:760px;max-height:90vh;
    overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;
    border-bottom:1px solid #e5e7eb;background:#fafafa}
  .modal-header .x{cursor:pointer;color:#5b6470;font-size:18px;padding:4px 8px}

  /* PDF preview styling (looks like a real document) */
  .pdf-doc{background:#fff;color:#0a0d14;font-family:'Inter',sans-serif;padding:48px;position:relative}
  .pdf-doc::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:#E1FFA0}
  .pdf-doc h1{font-size:18px;margin:0 0 4px;letter-spacing:-.3px}
  .pdf-doc .pdf-eyebrow{font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:#959aa2;margin-bottom:4px;font-weight:500}
  .pdf-doc .pdf-sub{font-size:10px;color:#5b6470;margin-bottom:16px}
  .pdf-doc .pdf-header{display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid #e5e7eb;padding-bottom:14px;margin-bottom:24px}
  .pdf-doc .pdf-brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:12px}
  .pdf-doc .pdf-brand-mark{width:14px;height:14px;background:#E1FFA0;border-radius:3px}
  .pdf-doc .pdf-meta{display:flex;flex-wrap:wrap;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;
    padding:12px 0;margin-bottom:18px;gap:8px 0}
  .pdf-doc .pdf-meta-cell{width:25%;padding-right:10px;margin-bottom:6px}
  .pdf-doc .pdf-meta-label{font-size:8px;color:#959aa2;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
  .pdf-doc .pdf-meta-value{font-size:11px;font-family:'JetBrains Mono',monospace}
  .pdf-doc .pdf-verdict{border-left:2px solid #c43c2e;padding-left:14px;margin-bottom:24px}
  .pdf-doc .pdf-verdict-h{font-size:13px;font-weight:600}
  .pdf-doc .pdf-verdict-sub{font-size:10px;color:#5b6470;margin-top:4px;line-height:1.5}
  .pdf-doc .pdf-figs{display:flex;flex-wrap:wrap;border-top:.5px solid #e5e7eb;margin-top:12px;padding-top:10px}
  .pdf-doc .pdf-fig{width:33.33%}
  .pdf-doc .pdf-fig-l{font-size:8px;color:#959aa2;text-transform:uppercase;letter-spacing:.8px}
  .pdf-doc .pdf-fig-v{font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:2px}
  .pdf-doc .pdf-fig-v.signal{color:#c43c2e}
  .pdf-doc .pdf-fig-v.ok{color:#2f8a5e}
  .pdf-doc .pdf-section{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:#959aa2;
    font-weight:600;border-bottom:.5px solid #e5e7eb;padding-bottom:6px;margin-bottom:10px;margin-top:18px}
  .pdf-doc .pdf-finding{border:.5px solid #e5e7eb;padding:12px;margin-bottom:10px;border-radius:2px}
  .pdf-doc .pdf-finding.s{border-left:2px solid #c43c2e}
  .pdf-doc .pdf-finding.w{border-left:2px solid #a07410}
  .pdf-doc .pdf-finding-h{display:flex;justify-content:space-between;margin-bottom:6px}
  .pdf-doc .pdf-finding-h .name{font-size:11px;font-weight:600}
  .pdf-doc .pdf-finding-h .tag{font-size:8px;letter-spacing:.8px;text-transform:uppercase;font-weight:600}
  .pdf-doc .pdf-finding.s .tag{color:#c43c2e}
  .pdf-doc .pdf-finding.w .tag{color:#a07410}
  .pdf-doc .pdf-finding-body{font-size:9.5px;color:#5b6470;line-height:1.5;margin-top:4px;margin-bottom:8px}
  .pdf-doc .pdf-table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:9px;margin-top:6px}
  .pdf-doc .pdf-table th{font-size:8px;color:#959aa2;text-transform:uppercase;letter-spacing:.6px;
    padding:5px 0;border-bottom:.5px solid #e5e7eb;background:transparent;font-weight:500;text-align:left}
  .pdf-doc .pdf-table td{padding:5px 0;border-bottom:.5px solid #e5e7eb;color:#0a0d14;background:transparent}
  .pdf-doc .pdf-checklist{margin-top:6px}
  .pdf-doc .pdf-check{display:flex;gap:8px;margin-bottom:5px;font-size:9.5px}
  .pdf-doc .pdf-cb{width:9px;height:9px;border:.5px solid #5b6470;border-radius:1.5px;margin-top:2px;flex:none}
  .pdf-doc .pdf-appeals{margin-top:24px;padding:12px;background:#fafafa;border:.5px solid #e5e7eb}
  .pdf-doc .pdf-appeals h3{font-size:10px;font-weight:600;margin:0 0 4px}
  .pdf-doc .pdf-appeals p{font-size:9px;color:#5b6470;line-height:1.5;margin:0}
  .pdf-doc .pdf-footer{font-size:8px;color:#959aa2;font-family:'JetBrains Mono',monospace;
    border-top:.5px solid #e5e7eb;padding-top:8px;margin-top:24px;display:flex;justify-content:space-between}

  /* admin */
  .tabs{display:flex;gap:1px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .tabs a{padding:10px 14px;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabs a:hover{color:var(--ink)}
  .tabs a.active{color:var(--ink);border-bottom-color:var(--brand)}

  /* fade in transition */
  .fade-in{animation:fade-in 200ms ease-out both}
  @keyframes fade-in{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:none}}

  small.kbd{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--faint);margin-left:6px;
    padding:1px 5px;border:1px solid var(--line-strong);border-radius:4px}
  .btn.primary small.kbd{color:rgba(0,0,0,.4);border-color:rgba(0,0,0,.2)}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================================
 * Atlas Funded — Risk Operations
 * Interactive demo. Single file. All workflow + admin in one place.
 * ============================================================================
 */

/* ─── seed data ─────────────────────────────────────────────────────────── */

const FMT_USD = new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', minimumFractionDigits:2 });
const fmtCents = (c, opts={}) => {
  const n = c / 100;
  if (opts.compact && Math.abs(n) >= 1000) {
    const k = n/1000;
    return '$' + (k % 1 === 0 ? k.toFixed(0) : k.toFixed(1)) + 'k';
  }
  const s = FMT_USD.format(n);
  return opts.sign === 'always' && c > 0 ? '+' + s : s;
};

let session = {
  email: 'cian@atlasfunded.com',
  name: 'Cian',
  role: 'SENIOR_REVIEWER',
};

let allowedEmails = [
  { email: 'cian@atlasfunded.com',  addedAt: '2026-01-04', addedBy: 'admin' },
  { email: 'admin@atlasfunded.com', addedAt: '2026-01-01', addedBy: 'system' },
  { email: 'ops@atlasfunded.com',   addedAt: '2026-02-12', addedBy: 'cian' },
];

let users = [
  { id:'u1', name:'Cian',           email:'cian@atlasfunded.com',  role:'SENIOR_REVIEWER' },
  { id:'u2', name:'Bootstrap Admin',email:'admin@atlasfunded.com', role:'ADMIN' },
  { id:'u3', name:'Ops Reviewer',   email:'ops@atlasfunded.com',   role:'REVIEWER' },
];

let ruleConfig = {
  'sub_3_min.threshold_seconds': 180,
  'concentrated_daily_loss.per_asset_limit_multiplier': 0.5,
  'tick_scalping.cluster_size': 3,
  'tick_scalping.window_seconds': 10,
  // Excessive margin is a per-trade rule now.

/** True if the trade is within ±windowSec of an event affecting its symbol. */
function tradeMatchesEvent(trade, event, windowSec) {
  const affected = CURRENCY_AFFECTS[event.currency] || [];
  if (!affected.includes(trade.symbol)) return false;
  const tOpen = Date.parse(trade.openIso || trade.open);
  if (!Number.isFinite(tOpen)) return false;
  const eTime = Date.parse(event.timeUtc);
  return Math.abs(tOpen - eTime) <= windowSec * 1000;
}

/* ─── helpers ───────────────────────────────────────────────────────────── */

function $(html, ...vals) {
  // simple template literal helper that keeps it readable
  let out = html[0];
  for (let i = 0; i < vals.length; i++) out += vals[i] + html[i+1];
  return out;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function caseById(id) { return cases.find(c => c.id === id); }

function statusPill(status) {
  const map = {
    DRAFT:     ['Draft', 'muted'],
    IN_REVIEW: ['In review', 'warn'],
    DECIDED:   ['Decided', 'ok'],
    CLOSED:    ['Closed', 'muted'],
  };
  const [label, cls] = map[status] || map.DRAFT;
  return `<span class="pill ${cls}">● ${label}</span>`;
}

// Rules whose findings auto-deduct profit (severity = DEDUCTION).
const DEDUCTION_RULE_KEYS = new Set(['SUB_3_MIN', 'EXCESSIVE_MARGIN_USAGE']);
function isDeductionRuleKey(key) { return DEDUCTION_RULE_KEYS.has(key); }
function isDeductionKind(b) { return b.kind === 'deduction' || b.kind === 'auto' || isDeductionRuleKey(b.ruleKey); }

function ruleLabel(key) {
  return ({
    SUB_3_MIN: 'Sub-3-minute trades',
    CONCENTRATED_DAILY_LOSS: 'Concentrated daily loss',
    TICK_SCALPING_CLUSTER: 'Tick-scalping cluster',
    EXCESSIVE_MARGIN_USAGE: 'Excessive margin usage',
    REPEATED_EXCESSIVE_MARGIN: 'Excessive margin usage', // legacy alias
    NEWS_TRADING: 'Trading around high-impact news',
  })[key] || key;
}

  if (!c) return renderShell('<div>Not found</div>');

  if (c.breaches.length === 0 && c.status !== 'DECIDED') {
    // Hasn't uploaded yet for this case
    return renderShell(renderUploadView(c));
  }

  return renderShell(renderAnalysisView(c));
}

function renderUploadView(c) {
  return `
    <div class="fade-in">
      ${caseHeader(c)}
      <div class="card" style="margin-top:16px;padding:8px">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('csvInput').click()">
          <input id="csvInput" type="file" accept=".csv" style="display:none" />
          <div class="eyebrow" style="margin-bottom:8px">Step 2</div>
          <div style="font-size:14px;color:var(--ink);font-weight:500;margin-bottom:6px">Upload trade-history CSV</div>

            Schema is validated automatically; rows parsed and analysed in one pass.
          </div>
          <button class="btn primary" type="button">Choose file</button>
        </div>
      </div>
    </div>
  `;
}

function renderAnalysisView(c) {
  const liveDeductionCents = c.breaches.reduce((s,b) => s + (b.applied ? b.suggestedDeductionCents : 0), 0);
  const livePayableCents = c.reportedPnlCents - liveDeductionCents;
  const isLocked = !!c.lockedAt;

  return `
    <div class="fade-in">
      ${caseHeader(c, livePayableCents, liveDeductionCents)}

      <div class="charts-grid">
        <div class="card span2">
          <h3>Equity curve <span class="delta">${fmtCents(c.parsedPnlCents,{sign:'always'})} over ${c.upload.rowCount} trades</span></h3>
          ${equityCurveSvg(c)}
          <div class="legend">
            <span><i style="background:var(--brand)"></i>Cumulative P&amp;L</span>
            <span><i style="background:var(--signal)"></i>Breach event</span>
          </div>
        </div>
        <div class="card">
          <h3>Per-symbol P&amp;L <span class="delta">${c.perSymbolPnl.length} symbols</span></h3>
          ${perSymbolSvg(c)}
        </div>
        <div class="card span2">
          <h3>Daily P&amp;L <span class="delta">${c.dailyPnl.length} trading days</span></h3>
          ${dailyPnlSvg(c)}
        </div>
        <div class="card">
          <h3>Duration histogram <span class="delta">≤ 3:00 highlighted</span></h3>
          ${durationSvg(c)}
        </div>
      </div>

      <div class="bcards">
        ${c.breaches.map(b => `
          <div class="bcard ${isDeductionKind(b) ? 'signal' : 'warn'}">
            <div class="lbl ${isDeductionKind(b) ? 's' : 'w'}">● ${isDeductionKind(b) ? 'Deduction' : 'Manual review'}</div>
            <div class="name">${ruleLabel(b.ruleKey)}</div>
            <div class="stat ${isDeductionKind(b) ? 'minus' : ''}">
              ${isDeductionKind(b) ? '−' + fmtCents(b.suggestedDeductionCents) : (b.trades?.length || 0) + ' trades'}
            </div>
            <div class="meta">${isDeductionKind(b) ? (b.applied ? 'Auto-applied to payable' : 'Excluded by reviewer') : 'Reviewer judgment required'}</div>
          </div>
        `).join('')}
      </div>

      <div style="margin-top:18px">
        ${c.breaches.map(b => renderFinding(c, b)).join('')}
      </div>

      <div class="decide">
        <div class="total">
          <span>Reported <b>${fmtCents(c.reportedPnlCents)}</b></span>
          <span>Auto −<b style="color:var(--signal)">${fmtCents(liveDeductionCents)}</b></span>
          <span>Payable <b style="color:var(--ok)">${fmtCents(livePayableCents)}</b></span>
          ${liveDeductionCents > ruleConfig['senior_approval.threshold_cents'] && session.role !== 'SENIOR_REVIEWER' && session.role !== 'ADMIN'
            ? '<span class="pill warn" style="margin-left:8px">Senior approval required</span>' : ''}
        </div>
        <div style="display:flex;gap:8px">
          ${isLocked ? `
            <span style="color:var(--faint);font-size:12.5px;padding:8px 14px">Decided · ${c.decision?.verdict.replaceAll('_',' ')}</span>
            <button class="btn primary" onclick="openPdfPreview('${c.id}')">View PDF report</button>
          ` : `
            <button class="btn" onclick="decide('${c.id}','APPROVE_FULL')">Approve full</button>
            <button class="btn primary" onclick="decide('${c.id}','APPROVE_WITH_DEDUCTIONS')">Approve with deductions</button>
            <button class="btn danger" onclick="decide('${c.id}','REJECT')">Reject</button>
            <button class="btn" onclick="decide('${c.id}','ESCALATE')">Escalate</button>
            <button class="btn" onclick="openPdfPreview('${c.id}')" style="margin-left:8px">Generate PDF</button>

function caseHeader(c, livePayable, liveDeduction) {
  const phaseLabel = c.phase === 'FUNDED' ? 'Funded' : 'Phase 1';
  const isLocked = !!c.lockedAt;
  const verdict = c.decision?.verdict;
  const at = accountTypes[c.accountType];
  const ddLabel = at ? `${(at.dailyDd*100).toFixed(0)}% / ${(at.maxDd*100).toFixed(0)}%` : '—';
  return `
    <div class="crumbs">
      <div>Cases / <b class="mono">${c.reviewId}</b> · ${escapeHtml(c.traderEmail)}</div>
      <div style="display:flex;gap:8px">
        ${statusPill(c.status)}
        <span class="pill muted">${phaseLabel}</span>
        <span class="pill muted">${at?.label || c.accountType} · ${ddLabel}</span>
        <span class="pill muted">Engine v0.1.0+a3f9c2</span>
      </div>
    </div>

    <div class="hero">
      <div class="eyebrow" style="margin-bottom:4px">Payout review · ${c.reviewId}</div>
      <h1>Payout review — ${escapeHtml(c.traderEmail)}</h1>
      <div class="sub">Account #${c.accountNumber} · ${fmtCents(c.accountSizeCents,{compact:true})} · ${at?.label || c.accountType} (${ddLabel}) · ${c.product.replaceAll('_',' ')} · ${c.upload?.rowCount || 0} trades</div>

      <div class="hero-meta">
        <span><b>Reported P&amp;L</b> ${fmtCents(c.reportedPnlCents)}</span>
        <span><b>Parsed</b> ${fmtCents(c.parsedPnlCents || 0)}</span>
        <span><b>Deductions</b> <span style="color:var(--signal)" class="mono">−${fmtCents(liveDeduction ?? c.totalDeductionCents)}</span></span>
        <span><b>Suggested payable</b> <span style="color:var(--ok)" class="mono">${fmtCents(livePayable ?? c.payableAmountCents)}</span></span>
        <span><b>Reviewed by</b> ${escapeHtml(c.reviewer || session.name)}</span>
        ${isLocked && c.decidedBy ? `<span><b>Decided by</b> ${escapeHtml(c.decidedBy)}</span>` : ''}
      </div>

      ${c.breaches.length > 0 && !isLocked ? `
        <div class="verdict-banner">
          <div class="ic">!</div>
          <div class="t"><b>Deductions apply &amp; manual review required.</b>
            <small>${c.breaches.filter(b => isDeductionKind(b)).length} auto-deduction(s), ${c.breaches.filter(b => !isDeductionKind(b)).length} manual flag(s).</small>
          </div>
        </div>` : ''}

      ${isLocked ? `
        <div class="verdict-banner ${verdict === 'REJECT' ? '' : 'ok'}">
          <div class="ic">${verdict === 'REJECT' ? '✕' : '✓'}</div>
          <div class="t"><b>Decided: ${verdict.replaceAll('_',' ')}.</b>
            <small>${escapeHtml(c.decision.notes || '')}</small>
          </div>
        </div>` : ''}
    </div>
  `;
}

function renderFinding(c, b) {
  const kind = isDeductionKind(b) ? 's' : 'w';
  const trades = b.trades || [];
  const wording = ruleText[b.ruleKey] || '';
  const isLocked = !!c.lockedAt;

  return `
    <details class="finding" ${trades.length > 0 ? 'open' : ''}>
      <summary>
        <div class="l">
          <span class="ic-dot ${kind}"></span>
          <span class="finding-name">${ruleLabel(b.ruleKey)}</span>
          <span class="finding-tag ${kind}">${isDeductionKind(b) ? 'Deduction' : 'Manual review'}</span>
        </div>
        <div class="r">
          <span>${trades.length} trade${trades.length === 1 ? '' : 's'}</span>
          ${isDeductionKind(b) ? `
            <label style="display:flex;align-items:center;gap:8px;font-family:'Inter';font-size:11px;color:var(--muted)">
              <input type="checkbox" class="toggle" ${b.applied ? 'checked':''} ${isLocked ? 'disabled':''}
                onclick="event.stopPropagation()"
                onchange="toggleBreach('${c.id}','${b.id}', this.checked)" />
              apply −${fmtCents(b.suggestedDeductionCents)}
            </label>
          ` : '<span class="flag">flag only</span>'}
        </div>
      </summary>
      <div class="body">
        <div class="rule-quote">${escapeHtml(wording.split('\n\n')[0].replace(/\*\*/g,''))}</div>
        ${b.meta ? renderBreachMeta(b) : ''}
        ${trades.length > 0 ? `
          <table class="trade-table">
            <thead>
              <tr>
                <th>UID</th><th>Symbol</th><th>Open · Close (UTC)</th><th>Duration</th>
                ${b.ruleKey === 'REPEATED_EXCESSIVE_MARGIN' ? '<th>Notional</th>' : ''}
                <th style="text-align:right">Profit</th>
              </tr>
            </thead>
            <tbody>
              ${trades.map(t => `
                <tr ${isDeductionKind(b) ? 'class="row-flag"' : ''}>
                  <td>${t.uid}</td>
                  <td class="sym">${t.symbol}</td>
                  <td>${escapeHtml(t.open)} → ${escapeHtml(t.close)}</td>
                  <td>${t.dur}</td>
                  ${b.ruleKey === 'REPEATED_EXCESSIVE_MARGIN' ? `<td>${t.notional}</td>` : ''}
                  <td class="num ${t.profit >= 0 ? 'plus':'minus'}">${fmtCents(t.profit,{sign:'always'})}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>` : ''}
      </div>
    </details>
  `;
}

function renderBreachMeta(b) {
  const m = b.meta;
  if (b.ruleKey === 'CONCENTRATED_DAILY_LOSS') {
    // Recompute the threshold from the case's account type so the value
    // updates if the admin edits per-account-type DDs.
    return `<div class="mono" style="font-size:11.5px;color:var(--muted);margin-bottom:10px">
      ${m.symbol} · ${m.date} · net loss ${fmtCents(m.netLoss)} · threshold ${fmtCents(m.threshold)} · over by <span style="color:var(--signal)">${fmtCents(m.overBy)}</span>
    </div>`;
  }
  if (b.ruleKey === 'TICK_SCALPING_CLUSTER') {
    return `<div class="mono" style="font-size:11.5px;color:var(--muted);margin-bottom:10px">
      Window ${m.windowStart} → ${m.windowEnd} (${m.span}) · ${b.trades.length} trades
    </div>`;
  }
  if (b.ruleKey === 'REPEATED_EXCESSIVE_MARGIN') {
    return `<div class="mono" style="font-size:11.5px;color:var(--muted);margin-bottom:10px">
      Pattern threshold: ${m.threshold} · ${m.count} oversized trades flagged
    </div>`;
  }
  return '';
}

/* ─── inline SVG charts ─────────────────────────────────────────────────── */

function equityCurveSvg(c) {
  // synthesize a smooth curve from dailyPnl for visual richness
  let cum = 0; const points = [];
  c.dailyPnl.forEach((d, i) => { cum += d.v; points.push(cum); });
  const W = 480, H = 140, T=12, B=22;
  const innerH = H - T - B;
  const minY = Math.min(0, ...points), maxY = Math.max(0, ...points);
  const yRange = Math.max(1, maxY - minY);
  const xAt = i => (i / (points.length-1)) * W;
  const yAt = v => T + innerH - ((v - minY) / yRange) * innerH;
  const polyline = points.map((p,i) => `${xAt(i)},${yAt(p)}`).join(' ');
  const area = `0,${T+innerH} ${polyline} ${W},${T+innerH}`;
  const breachIdx = c.dailyPnl.findIndex(d => d.flag);

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:140px;display:block;overflow:visible">
    <defs><linearGradient id="eq" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#E1FFA0" stop-opacity=".32"/>
      <stop offset="100%" stop-color="#E1FFA0" stop-opacity="0"/>
    </linearGradient></defs>
    <line x1="0" y1="${yAt(0)}" x2="${W}" y2="${yAt(0)}" stroke="#1e242f"/>
    <polygon points="${area}" fill="url(#eq)"/>
    <polyline points="${polyline}" fill="none" stroke="#E1FFA0" stroke-width="1.6"/>
    ${breachIdx >= 0 ? `
      <circle cx="${xAt(breachIdx)}" cy="${yAt(points[breachIdx])}" r="3" fill="#ef5c5c"/>
      <text x="${xAt(breachIdx) + 6}" y="${yAt(points[breachIdx]) - 4}" class="axis-text" style="fill:#ef5c5c">XAUUSD breach</text>
    ` : ''}
    <text x="0" y="${H-4}" class="axis-text">${c.upload.dateRangeStart || 'start'}</text>
    <text x="${W-60}" y="${H-4}" class="axis-text">${c.upload.dateRangeEnd || 'end'}</text>
  </svg>`;
}

function dailyPnlSvg(c) {
  const W = 480, H = 140, T=12, B=22;
  const innerH = H - T - B;
  const maxAbs = Math.max(1, ...c.dailyPnl.map(d => Math.abs(d.v)));
  const barW = (W - c.dailyPnl.length * 2) / c.dailyPnl.length;
  const zeroY = T + innerH/2;
  const halfH = innerH/2;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:140px;display:block;overflow:visible">
    <line x1="0" y1="${zeroY}" x2="${W}" y2="${zeroY}" stroke="#1e242f"/>
    ${c.dailyPnl.map((d,i) => {
      const h = (Math.abs(d.v)/maxAbs) * halfH;
      const x = i * (barW+2);
      const y = d.v >= 0 ? zeroY - h : zeroY;
      return `<rect x="${x}" y="${y}" width="${Math.max(2,barW)}" height="${Math.max(1,h)}" rx="1"
        fill="${d.v >= 0 ? '#5fd09b' : '#ef5c5c'}"/>`;
    }).join('')}
    <text x="0" y="${H-4}" class="axis-text">Apr ${c.dailyPnl[0]?.date}</text>
    <text x="${W-60}" y="${H-4}" class="axis-text">Apr ${c.dailyPnl[c.dailyPnl.length-1]?.date}</text>
  </svg>`;
}

function perSymbolSvg(c) {
  const rows = c.perSymbolPnl;
  const maxAbs = Math.max(1, ...rows.map(r => Math.abs(r.pnl)));
  const W = 320, rowH = 16;
  const labelW = 56, valueW = 64;
  const barX = labelW + 2, barW = W - labelW - valueW - 6;
  return `<svg viewBox="0 0 ${W} ${rows.length * rowH}" style="width:100%;height:${rows.length * rowH}px;display:block;overflow:visible">
    ${rows.map((r,i) => {
      const y = i * rowH;
      const w = (Math.abs(r.pnl)/maxAbs) * barW;
      const x = r.pnl < 0 ? barX + barW - w : barX;
      const fill = r.pnl < 0 ? '#ef5c5c' : '#5fd09b';
      return `
        <text x="0" y="${y+11}" font-family="JetBrains Mono,monospace" font-size="10" fill="#a6acba">${r.symbol}</text>
        <rect x="${x}" y="${y+4}" width="${Math.max(1,w)}" height="9" rx="2" fill="${fill}"/>
        <text x="${W-4}" y="${y+11}" font-family="JetBrains Mono,monospace" font-size="10"
          fill="${r.pnl < 0 ? '#ef5c5c' : '#eef0f4'}" text-anchor="end">${fmtCents(r.pnl,{sign:'always'})}</text>
      `;
    }).join('')}
  </svg>`;
}

function durationSvg(c) {
  const W = 320, H = 140, T = 12, B = 22;
  const innerH = H - T - B;
  const max = Math.max(1, ...c.durationHist.map(b => b.count));
  const sub3End = c.durationHist.findIndex(b => !b.sub3);
  const subBoundaryX = sub3End < 0 ? W : sub3End * (W/c.durationHist.length);
  const barW = (W - c.durationHist.length*2) / c.durationHist.length;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:140px;display:block;overflow:visible">
    <rect x="0" y="0" width="${subBoundaryX}" height="${H-B}" fill="rgba(239,92,92,0.10)"/>
    <line x1="${subBoundaryX}" y1="0" x2="${subBoundaryX}" y2="${H-B}" stroke="#ef5c5c" stroke-dasharray="2 3"/>
    <text x="${subBoundaryX+2}" y="12" font-family="JetBrains Mono,monospace" font-size="10" fill="#ef5c5c">3:00</text>
    ${c.durationHist.map((b,i) => {
      const h = (b.count/max) * innerH;
      const x = i * (barW+2);
      return `<rect x="${x}" y="${T+innerH-h}" width="${Math.max(2,barW)}" height="${Math.max(1,h)}" rx="1"
        fill="${b.sub3 ? '#ef5c5c' : '#5fd09b'}"/>`;
    }).join('')}
    <text x="0" y="${H-4}" class="axis-text">0s</text>
    <text x="${W-30}" y="${H-4}" class="axis-text">24h+</text>
  </svg>`;
}

/* ─── economic calendar screen ──────────────────────────────────────────── */

function renderCalendar() {
  const nowMs = Date.now();
  const windowSec = ruleConfig['news_trading.window_seconds'];
  // Sort events asc by time; group by date.
  const sorted = [...economicEvents].sort((a, b) => Date.parse(a.timeUtc) - Date.parse(b.timeUtc));

  // Pre-compute matched trades per event by scanning every case's breaches.
  function matchesForEvent(ev) {
    const matches = [];
    for (const c of cases) {
      for (const b of (c.breaches || [])) {
        for (const t of (b.trades || [])) {
          if (!t.openIso) continue;
          if (Math.abs(Date.parse(t.openIso) - Date.parse(ev.timeUtc)) <= windowSec * 1000) {
            const aff = CURRENCY_AFFECTS[ev.currency] || [];
            if (aff.includes(t.symbol)) {
              matches.push({ caseRef: c.reviewId, caseId: c.id, uid: t.uid, symbol: t.symbol, openIso: t.openIso });
            }
          }
        }
      }
    }
    return matches;
  }

  return renderShell(`
    <div class="fade-in">
      <div class="crumbs">
        <div>Workspace / <b>Economic calendar</b></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="pill muted">UTC</span>
          <span class="pill signal">RED / HIGH only</span>
          <span class="pill muted">Window ±${windowSec}s</span>
        </div>
      </div>

      <div style="margin-bottom:14px">
        <div class="eyebrow">Workspace</div>
        <h1 style="font-size:24px;font-weight:600;margin:6px 0 4px;letter-spacing:-.01em">Economic calendar</h1>
        <p style="color:var(--faint);font-size:12px;margin:0">
          High-impact (red folder) releases only. Times are UTC, matched against UTC trade timestamps from uploaded CSVs.
          Sources: <a href="https://www.forexfactory.com/" target="_blank" rel="noopener" style="color:var(--brand)">forexfactory.com</a>
          · <a href="https://uk.investing.com/economic-calendar" target="_blank" rel="noopener" style="color:var(--brand)">uk.investing.com</a>
          · <a href="https://www.myfxbook.com/forex-economic-calendar" target="_blank" rel="noopener" style="color:var(--brand)">myfxbook.com</a>.
        </p>
      </div>

      <div class="card" style="padding:0;overflow:hidden">
        <table>
          <thead>
            <tr>
              <th>Date · Time UTC</th>
              <th>Currency</th>
              <th>Event</th>
              <th>Impact</th>
              <th>Source</th>
              <th>Matched trades (open within window)</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.map(ev => {
              const ms = Date.parse(ev.timeUtc);
              const isFuture = ms > nowMs;
              const matches = matchesForEvent(ev);
              const dateStr = ev.timeUtc.slice(0,10) + ' · ' + ev.timeUtc.slice(11,16);
              return `
                <tr>
                  <td>
                    <div class="mono" style="color:var(--ink)">${dateStr} UTC</div>
                    <div class="mono" style="font-size:10.5px;color:var(--faint)">${isFuture ? 'upcoming' : 'past'}</div>
                  </td>
                  <td><span class="pill muted mono">${ev.currency}</span></td>
                  <td style="color:var(--ink)">${escapeHtml(ev.name)}</td>
                  <td><span class="pill signal">RED</span></td>
                  <td><a href="https://${ev.source}" target="_blank" rel="noopener" class="mono" style="color:var(--muted);font-size:11.5px">${ev.source}</a></td>
                  <td>
                    ${matches.length === 0
                      ? `<span style="color:var(--faint)">—</span>`
                      : matches.map(m =>
                          `<a href="#/cases/${m.caseId}" class="mono" style="color:var(--brand);font-size:11.5px;margin-right:10px">
                            ${m.caseRef} · ${m.symbol} · ${m.uid}
                          </a>`).join('')}
                  </td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `);
}

  return renderShell(`
    <div class="fade-in">
      <div class="eyebrow">Admin</div>
      ${adminTabs('#/admin/rules')}
      <div class="card">

/* ─── actions ───────────────────────────────────────────────────────────── */

let pdfCaseId = null;
let signedIn = true; // for the demo we start signed in. Click "sign out" to see sign-in.

function toggleBreach(caseId, breachId, applied) {
  const c = caseById(caseId); if (!c) return;
  const b = c.breaches.find(x => x.id === breachId); if (!b) return;
  b.applied = applied;
  c.totalDeductionCents = c.breaches.reduce((s,x) => s + (x.applied ? x.suggestedDeductionCents : 0), 0);
  c.payableAmountCents = c.reportedPnlCents - c.totalDeductionCents;
  audit('BREACH_TOGGLED', { breachId, ruleKey: b.ruleKey, applied, newTotalDeductionCents: c.totalDeductionCents }, c.id);
  render();
}

function decide(caseId, verdict) {
  const c = caseById(caseId); if (!c) return;
  const liveDeduction = c.breaches.reduce((s,b) => s + (b.applied ? b.suggestedDeductionCents : 0), 0);
  const seniorThreshold = ruleConfig['senior_approval.threshold_cents'];
  const requiresSenior = verdict === 'REJECT' || verdict === 'ESCALATE' || liveDeduction > seniorThreshold;
  if (requiresSenior && session.role !== 'SENIOR_REVIEWER' && session.role !== 'ADMIN') {
    alert(`Senior approval required: ${verdict === 'REJECT' ? 'rejection requires senior sign-off' :
      verdict === 'ESCALATE' ? 'escalation requires senior sign-off' :
      `total deductions ${fmtCents(liveDeduction)} exceed the $${(seniorThreshold/100).toFixed(2)} senior threshold`}.`);
    return;
  }
  if (!confirm(`Confirm decision: ${verdict.replaceAll('_',' ')}?\nThis locks the case and is audit-logged.`)) return;
  c.status = 'DECIDED';
  c.lockedAt = new Date().toISOString();
  c.decidedAt = c.lockedAt;
  c.decidedBy = session.name;
  c.reviewer = c.reviewer || session.name;
  c.totalDeductionCents = liveDeduction;
  c.payableAmountCents = verdict === 'REJECT' ? 0 : c.reportedPnlCents - liveDeduction;
  c.decision = { verdict, notes: '' };
  audit('DECISION_MADE', { verdict, finalPayableCents: c.payableAmountCents, totalDeductionCents: liveDeduction, decidedBy: session.name }, c.id);
  render();
}

function openPdfPreview(caseId) {
  pdfCaseId = caseId;
  audit('REPORT_GENERATED', { caseId, format: 'PDF' }, caseId);
  render();
}
function closePdfPreview() { pdfCaseId = null; render(); }

function removeAllowed(email) {
  allowedEmails = allowedEmails.filter(a => a.email !== email);
  audit('ALLOWED_EMAIL_REMOVED', { email });
  render();
}
function setRole(userId, role) {
  const u = users.find(x => x.id === userId); if (!u) return;
  const before = u.role;
  u.role = role;
  audit('USER_ROLE_CHANGED', { userId, role, before });
  render();
}

/* ─── master render ─────────────────────────────────────────────────────── */

function render() {
  const root = document.getElementById('app');
  if (!signedIn) {
    root.innerHTML = renderSignIn();
    document.getElementById('signInForm')?.addEventListener('submit', e => {
      e.preventDefault();
      signedIn = true;
      audit('USER_SIGNED_IN', { email: session.email });
      render();
    });
    return;
  }

  let body = '';
  if (route.startsWith('#/cases/new')) body = renderNewCase();
  else if (route.startsWith('#/cases/')) body = renderCaseDetail(route.split('/')[2]?.split('?')[0]);
  else if (route.startsWith('#/cases')) body = renderCases();
  else if (route.startsWith('#/calendar')) body = renderCalendar();
  else if (route.startsWith('#/admin/rules')) body = renderAdminRules();
  else if (route.startsWith('#/admin/account-types')) body = renderAdminAccountTypes();
  else if (route.startsWith('#/admin/wording')) body = renderAdminWording();
  else if (route.startsWith('#/admin/users')) body = renderAdminUsers();
  else if (route.startsWith('#/admin/audit')) body = renderAdminAudit();
  else body = renderCases();

  root.innerHTML = body + (pdfCaseId ? renderPdfModal(caseById(pdfCaseId)) : '');

  // Form handlers
  document.getElementById('newCaseForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const f = new FormData(e.target);
    const c = {
      id: 'c' + (cases.length + 1),
      reviewId: 'AF-2026-0014' + (cases.length + 1),
      traderEmail: f.get('traderEmail'),
      accountNumber: f.get('accountNumber'),
      accountSizeCents: Math.round(Number(f.get('accountSize')) * 100),
      phase: f.get('phase'),
      product: f.get('product'),
      accountType: f.get('accountType'),
      reportedPnlCents: Math.round(Number(f.get('reportedPnl')) * 100),
      parsedPnlCents: 0, totalDeductionCents: 0, payableAmountCents: null,
      status: 'DRAFT', createdAt: new Date().toISOString().slice(0,10),
      decidedAt: null, lockedAt: null, breaches: [],
    };
    cases.unshift(c);
    audit('CASE_CREATED', { reviewId: c.reviewId, traderEmail: c.traderEmail, accountType: c.accountType }, c.id);
    go('#/cases/' + c.id);
  });

  document.getElementById('csvInput')?.addEventListener('change', e => {
    const file = e.target.files?.[0];
    if (!file) return;
    // Demo: pretend we parsed and analysed; copy breach data from the alex.morgan demo case
    const c = caseById(route.split('/')[2]);
    if (!c) return;
    const template = cases.find(x => x.id === 'c1');
    c.upload = { ...template.upload, filename: file.name };
    c.breaches = JSON.parse(JSON.stringify(template.breaches));
    c.dailyPnl = template.dailyPnl;
    c.perSymbolPnl = template.perSymbolPnl;
    c.durationHist = template.durationHist;
    c.parsedPnlCents = template.parsedPnlCents;
    c.totalDeductionCents = c.breaches.reduce((s,b) => s + (b.applied ? b.suggestedDeductionCents : 0), 0);
    c.payableAmountCents = c.reportedPnlCents - c.totalDeductionCents;
    c.status = 'IN_REVIEW';
    audit('UPLOAD_REPLACED_AND_ANALYZED', {
      uploadId: 'u' + Date.now(), sha256: c.upload.sha256,
      rowCount: c.upload.rowCount, findingCount: c.breaches.length,
      deductionCents: c.totalDeductionCents,
    }, c.id);
    render();
  });

  document.getElementById('accountTypesForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const f = new FormData(e.target);
    let changed = false;
    for (const [name, raw] of f.entries()) {
      const [type, field] = name.split('.');
      const next = Number(raw);
      if (!accountTypes[type]) continue;
      if (!Number.isFinite(next)) continue;
      if (accountTypes[type][field] !== next) {
        audit('ACCOUNT_TYPE_CONFIG_CHANGED', { accountType: type, [field]: next, before: accountTypes[type][field] });
        accountTypes[type][field] = next;
        changed = true;
      }
    }
    // Recompute thresholds on any open cases that match changed types
    for (const c of cases) {
      if (!c.breaches) continue;
      const at = accountTypes[c.accountType];
      if (!at) continue;
      for (const b of c.breaches) {
        if (b.ruleKey === 'CONCENTRATED_DAILY_LOSS' && b.meta) {
          const newThresh = Math.round(c.accountSizeCents * at.dailyDd * ruleConfig['concentrated_daily_loss.per_asset_limit_multiplier']);
          b.meta.threshold = newThresh;
          b.meta.overBy = b.meta.netLoss - newThresh;
        }
      }
    }
    if (changed) flash('Account-type DDs saved. Thresholds recomputed for open cases.');
    render();
  });

  document.getElementById('rulesForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const f = new FormData(e.target);
    for (const [k, v] of f.entries()) {
      if (ruleConfig[k] !== undefined) {
        const next = Number(v);
        if (!Number.isNaN(next) && next !== ruleConfig[k]) {
          audit('RULE_CONFIG_CHANGED', { key: k, before: ruleConfig[k], after: next });
          ruleConfig[k] = next;
        }
      }
    }
    flash('Rules saved. Next analysis run uses updated thresholds.');
  });

  document.getElementById('wordingForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const f = new FormData(e.target);
    for (const [k, v] of f.entries()) {
      const s = String(v).trim();
      if (s && ruleText[k] !== s) {
        audit('RULE_TEXT_CHANGED', { ruleKey: k });
        ruleText[k] = s;
      }
    }
    flash('Wording saved.');
  });

  document.getElementById('addEmailForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const email = String(new FormData(e.target).get('email')).toLowerCase().trim();
    if (allowedEmails.some(a => a.email === email)) return;
    allowedEmails.unshift({ email, addedAt: new Date().toISOString().slice(0,10), addedBy: session.name });
    audit('ALLOWED_EMAIL_ADDED', { email });
    render();
  });
}

function flash(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = `position:fixed;top:20px;right:20px;background:var(--ok-soft);color:var(--ok);
    border:1px solid rgba(95,208,155,.3);padding:10px 14px;border-radius:8px;font-size:12px;z-index:100`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

render();
</script>
</body>
</html>
